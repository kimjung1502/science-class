<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>과목 선택 · 정환쌤과 함께하는 과학 수업</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<script src="js/theme.js?v=20260724c"></script>
</head>
<body class="font-sans text-ink antialiased min-h-screen flex flex-col">

<!-- TopNavBar (학생 페이지 공통) -->
<header class="sticky top-0 z-50 border-b border-ink/15 bg-paper/85 backdrop-blur-md">
  <div class="mx-auto flex h-16 max-w-max-width items-center justify-between gap-2 px-4 sm:px-5 w-full">
    <a href="과목-선택.html" class="flex items-center gap-2.5 min-w-0 flex-1">
      <span class="inline-flex h-9 w-9 shrink-0 items-center justify-center rounded-md bg-ink text-lime font-mono text-sm font-bold">LAB</span>
      <div class="leading-tight min-w-0">
        <div class="font-mono text-[10px] uppercase tracking-[0.2em] text-signal">Science Class</div>
        <h1 class="font-bold tracking-tightest text-[15px] truncate">정환쌤과 함께하는 과학 수업</h1>
      </div>
    </a>
    <div class="flex items-center gap-1.5 sm:gap-3 shrink-0">
      <span id="teacher-badge" class="hidden font-mono text-[11px] font-bold text-lime bg-ink px-2.5 py-1 rounded-full whitespace-nowrap shrink-0">교사 시점</span>
      <span id="who" class="hidden sm:inline text-[13px] text-ink3 whitespace-nowrap"></span>
      <a id="admin-link" href="관리자.html" title="관리" class="hidden text-[13px] text-ink3 hover:text-signal items-center gap-1 shrink-0"><span class="material-symbols-outlined text-[20px] sm:text-[18px]">admin_panel_settings</span><span class="hidden sm:inline">관리</span></a>
      <button id="logout-btn" title="로그아웃" class="text-[13px] text-ink3 hover:text-signal flex items-center gap-1 shrink-0"><span class="material-symbols-outlined text-[20px] sm:text-[18px]">logout</span><span class="hidden sm:inline">로그아웃</span></button>
    </div>
  </div>
</header>

<div class="flex flex-1 max-w-max-width mx-auto w-full">
  <main class="flex-1 px-5 py-10 sm:py-12">
    <div class="max-w-5xl mx-auto">
      <div class="flex items-end justify-between flex-wrap gap-3 mb-7">
        <div>
          <div class="pin-label inline-flex items-center gap-2 rounded-full bg-ink px-3.5 py-1.5 text-[12px] font-bold text-lime shadow-note mb-4">
            <span class="text-signal">●</span> 과목 선택
          </div>
          <h2 class="text-3xl sm:text-4xl font-extrabold tracking-tightest">과목 선택</h2>
          <p class="mt-2 text-[14px] text-ink3 max-w-2xl leading-relaxed">탐구와 실험으로 과학적 소양을 기르는 정환쌤 과학 수업. 올해 배울 과목을 골라 <span class="hl-soft font-semibold">나의 실험노트</span>를 시작하세요.</p>
        </div>
        <span id="subject-count" class="font-mono text-[12px] text-ink3 border border-faint rounded-md px-3 py-1.5">SUBJECTS</span>
      </div>

      <!-- Subject Grid (DB에서 로드) -->
      <div id="subject-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
        <p class="text-ink3 col-span-full py-lg text-center">과목을 불러오는 중…</p>
      </div>
    </div>
  </main>
</div>

<!-- Mobile Bottom NavBar -->
<nav class="md:hidden sticky bottom-0 left-0 right-0 bg-paper/90 backdrop-blur border-t border-ink/15 flex justify-around py-2 z-40">
  <span class="flex flex-col items-center gap-0.5 text-ink min-w-[64px] py-1"><span class="material-symbols-outlined text-[22px]">menu_book</span><span class="font-mono text-[10px]">과목</span></span>
  <a href="비밀번호-변경.html" class="flex flex-col items-center gap-0.5 text-ink3 hover:text-ink min-w-[64px] py-1"><span class="material-symbols-outlined text-[22px]">person</span><span class="font-mono text-[10px]">내 정보</span></a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/db.js?v=20260710a"></script>
<script>
(async () => {
  const { fetchSubjects, ACCENTS, esc, requireLogin, signOut, supabase } = window.DB;

  const grid = document.getElementById('subject-grid');

  // 로그인 필수
  const auth = await requireLogin();
  if (!auth) return;

  // 사용자 표시 + 로그아웃
  const isAdminViewer = !auth.student; // 학생이 아니면 관리자(교사)
  document.getElementById('who').textContent = auth.student ? auth.student.name : '관리자';
  if (isAdminViewer) {
    document.getElementById('teacher-badge').classList.remove('hidden');
    document.getElementById('admin-link').classList.replace('hidden', 'flex');
  }
  document.getElementById('logout-btn').addEventListener('click', async () => { await signOut(); location.replace('학생-로그인.html'); });

  function card(s, i) {
    const a = ACCENTS[s.accent] || ACCENTS.blue;
    const n = String((i ?? 0) + 1).padStart(2, '0');
    return `<a href="과목-홈.html?subject=${s.id}"
      class="lift-hover card group relative rounded-xl p-6 shadow-note hover:shadow-lift ${a.border} flex flex-col focus:outline-none focus-visible:ring-2 ${a.ring}">
      <span class="absolute right-4 top-4 font-mono text-[11px] text-ink3/60">${n}</span>
      <div class="flex h-12 w-12 items-center justify-center rounded-lg" style="background:${a.iconBg};color:${a.iconFg};">
        <span class="material-symbols-outlined text-[24px]">${esc(s.icon || 'science')}</span>
      </div>
      <div class="mt-4 flex items-center gap-2">
        <h3 class="text-xl font-extrabold tracking-tight">${esc(s.name)}</h3>
        <span class="h-2.5 w-2.5 rounded-full" style="background:${a.dot}"></span>
      </div>
      <p class="mt-1.5 text-[13.5px] text-ink3 leading-relaxed flex-1">${esc(s.description || '')}</p>
      <div class="dashed mt-5 pt-3 flex items-center justify-between">
        <span class="font-mono text-[12px] font-bold text-ink group-hover:text-signal transition">과목 선택하기</span>
        <span class="inline-block transition-transform group-hover:translate-x-1.5 text-ink">→</span>
      </div>
    </a>`;
  }

  try {
    const subjects = await fetchSubjects();
    document.getElementById('subject-count').textContent = 'SUBJECTS · ' + String(subjects.length).padStart(2, '0');
    grid.innerHTML = subjects.length
      ? subjects.map(card).join('')
      : '<p class="text-ink3 col-span-full py-lg text-center">등록된 과목이 없습니다.</p>';
  } catch (e) {
    grid.innerHTML = `<p class="text-error col-span-full py-lg text-center">과목을 불러오지 못했습니다. (${esc(e.message)})</p>`;
  }
})();
</script>

</body>
</html>
