<!DOCTYPE html>
<html class="light" lang="ko">
<head>
<meta charset="utf-8">

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  tailwind.config = {
    darkMode: "class",
    theme: {

          "error": "#ba1a1a",
          "on-surface-variant": "#414754",
          "secondary-container": "#8df5e4",
          "on-surface": "#0d1c2e",
          "surface-container-lowest": "#ffffff",
          "on-secondary-container": "#00504a",
          "background": "#f8f9ff",
          "surface-bright": "#f8f9ff",
          "primary": "#005bbf",
          "on-primary": "#ffffff",
          "surface-container": "#e6eeff",
          "on-tertiary-container": "#341100",
          "outline-variant": "#c1c6d6",
          "tertiary": "#9e4300",
          "on-tertiary": "#ffffff",
          "surface-variant": "#d5e3fc",
          "primary-container": "#1a73e8",

        fontFamily: { "sans": ["Be Vietnam Pro", "sans-serif"] },
        fontSize: {

          "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
          "headline-lg": ["32px", {"lineHeight": "1.25", "fontWeight": "700"}],
          "display": ["44px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
          "label-md": ["14px", {"lineHeight": "1.2", "letterSpacing": "0.01em", "fontWeight": "500"}],

<style>
  body { font-family: "Be Vietnam Pro", sans-serif; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>

<body class="bg-background text-on-background min-h-screen flex flex-col">

<!-- TopNavBar (두 페이지 공통) -->
<header class="bg-surface border-b border-outline-variant z-50 sticky top-0">
  <div class="flex justify-between items-center h-16 px-md max-w-max-width mx-auto w-full">
    <div class="flex items-center gap-3">
      <span class="material-symbols-outlined text-primary text-[28px]">science</span>
      <h1 class="text-headline-md font-bold text-primary">정환쌤과 함께하는 과학 수업</h1>
    </div>
    <div class="flex items-center gap-3">
      <span id="teacher-badge" class="hidden text-caption text-white bg-primary px-2 py-0.5 rounded-full font-semibold">교사 시점</span>
      <span id="who" class="text-caption text-on-surface-variant hidden sm:inline"></span>
      <a id="admin-link" href="관리자.html" class="hidden text-caption text-on-surface-variant hover:text-primary items-center gap-1"><span class="material-symbols-outlined text-[20px]">admin_panel_settings</span>관리 페이지</a>
      <button id="logout-btn" class="text-caption text-on-surface-variant hover:text-primary flex items-center gap-1"><span class="material-symbols-outlined text-[20px]">logout</span>로그아웃</button>
    </div>
  </div>
</header>

<div class="flex flex-1 max-w-max-width mx-auto w-full">
  <main class="flex-1 p-md md:p-lg lg:p-xl overflow-y-auto">
    <div class="max-w-4xl mx-auto">
      <div class="mb-lg text-center md:text-left">
        <h2 class="text-display text-on-surface mb-xs">과목 선택</h2>
        <p class="text-body-lg text-on-surface-variant max-w-2xl">탐구와 실험을 통해 과학적 소양을 기르는 정환쌤과 함께하는 과학 수업의 핵심 커리큘럼입니다. 학습할 과목을 선택하세요.</p>
      </div>

      <!-- Subject Grid (DB에서 로드) -->
      <div id="subject-grid" class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
        <p class="text-on-surface-variant col-span-full py-lg text-center">과목을 불러오는 중…</p>
      </div>
    </div>
  </main>
</div>

<!-- Mobile Bottom NavBar -->
<nav class="md:hidden fixed bottom-0 left-0 right-0 bg-surface border-t border-outline-variant flex justify-around py-xs z-50">
  <button class="flex flex-col items-center gap-1 text-primary min-w-[64px] py-1"><span class="material-symbols-outlined">home</span><span class="text-caption">홈</span></button>
  <button class="flex flex-col items-center gap-1 text-on-surface-variant min-w-[64px] py-1"><span class="material-symbols-outlined">menu_book</span><span class="text-caption">과목</span></button>
  <button class="flex flex-col items-center gap-1 text-on-surface-variant min-w-[64px] py-1"><span class="material-symbols-outlined">person</span><span class="text-caption">내 정보</span></button>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/db.js?v=20260705a"></script>
<script>
(async () => {
  const { fetchSubjects, ACCENTS, esc, requireLogin, signOut, supabase } = window.DB;

  const grid = document.getElementById('subject-grid');

  // 로그인 필수
  const auth = await requireLogin();
  if (!auth) return;

  // 사용자 표시 + 로그아웃
  const isAdminViewer = !auth.student; // 학생이 아니면 관리자(교사)
  document.getElementById('who').textContent = auth.student ? auth.student.name : '관리자';
  if (isAdminViewer) {
    document.getElementById('teacher-badge').classList.remove('hidden');
    document.getElementById('admin-link').classList.replace('hidden', 'flex');
  }
  document.getElementById('logout-btn').addEventListener('click', async () => { await signOut(); location.replace('학생-로그인.html'); });

  function card(s, i) {
    const a = ACCENTS[s.accent] || ACCENTS.blue;
    return `<a href="과목-홈.html?subject=${s.id}"
      class="group bg-surface-container-lowest border border-outline-variant rounded-xl overflow-hidden hover:shadow-lg hover:-translate-y-1 ${a.border} transition-all duration-300 flex flex-col focus:outline-none focus-visible:ring-2 ${a.ring}">
      <div class="h-1.5 ${a.strip}"></div>
      <div class="p-md flex flex-col flex-1">
        <div class="mb-sm"><div class="${a.iconBox} p-3 rounded-lg w-fit"><span class="material-symbols-outlined text-[32px]">${esc(s.icon || 'science')}</span></div></div>
        <h3 class="text-headline-md text-on-surface mb-xs">${esc(s.name)}</h3>
        <p class="text-body-md text-on-surface-variant mb-md flex-1">${esc(s.description)}</p>
        <span class="w-full ${a.btn} text-white py-3 rounded-lg text-label-md font-bold text-center transition-colors">과목 선택하기</span>
      </div>
    </a>`;
  }

  try {
    const subjects = await fetchSubjects();
    grid.innerHTML = subjects.length
      ? subjects.map(card).join('')
      : '<p class="text-on-surface-variant col-span-full py-lg text-center">등록된 과목이 없습니다.</p>';
  } catch (e) {
    grid.innerHTML = `<p class="text-error col-span-full py-lg text-center">과목을 불러오지 못했습니다. (${esc(e.message)})</p>`;
  }
})();
</script>

</body>
</html>
