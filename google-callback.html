<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>구글 드라이브 연결 · 정환쌤과 함께하는 과학 수업</title>

<!-- 실험노트 테마: Pretendard + Space Mono -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{ --paper:#FBFAF6; --ink:#16213E; --ink3:#5A6379; --lime:#C4E000; --signal:#FF5B24; --line:#E7E4D6; }
  *{ box-sizing:border-box; }
  body {
    font-family:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,system-ui,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background-color:var(--paper);
    background-image:linear-gradient(to right,var(--line) 1px,transparent 1px),linear-gradient(to bottom,var(--line) 1px,transparent 1px);
    background-size:26px 26px;
    color:var(--ink); margin:0; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; padding:24px;
    -webkit-font-smoothing:antialiased;
  }
  .mono { font-family:"Space Mono",ui-monospace,SFMono-Regular,Menlo,monospace; }
  /* 브랜드 헤더 (카드 밖 — 상태가 바뀌어도 유지) */
  .brand { display:flex; align-items:center; gap:11px; }
  .brand .badge { display:inline-flex; height:36px; width:36px; align-items:center; justify-content:center; border-radius:9px; background:var(--ink); color:var(--lime); font-weight:700; font-size:13px; }
  .brand .kicker { font-size:10px; letter-spacing:.22em; text-transform:uppercase; color:var(--signal); }
  .brand .title { font-weight:700; font-size:15px; letter-spacing:-0.02em; line-height:1.2; }
  /* 상태 카드 */
  .card { position:relative; max-width:440px; width:100%; background:#fff; border:1px solid var(--line); border-radius:18px; padding:34px 30px 30px; text-align:center; box-shadow:0 1px 0 rgba(22,33,62,.04), 0 18px 40px -20px rgba(22,33,62,.40); }
  .icon { font-size:46px; margin-bottom:10px; line-height:1; }
  h1 { font-size:20px; margin:0 0 8px; letter-spacing:-0.02em; font-weight:800; }
  p { font-size:15px; line-height:1.65; color:#4A5064; margin:0 0 4px; }
  p b { color:var(--ink); }
  .btn { display:inline-block; margin-top:18px; background:var(--ink); color:var(--paper); text-decoration:none; font-weight:700; padding:12px 24px; border-radius:10px; border:0; cursor:pointer; font-size:15px; transition:transform .15s ease, box-shadow .15s ease; }
  .btn:hover { transform:translateY(-2px); box-shadow:0 12px 26px -12px rgba(22,33,62,.6); }
  .muted { color:#8A8676; font-size:13px; }
  /* 로딩 점멸 */
  .pulse { animation:labpulse 1.4s ease-in-out infinite; }
  @keyframes labpulse { 0%,100%{ opacity:1; } 50%{ opacity:.35; } }
  @media (prefers-reduced-motion:reduce){ .pulse{ animation:none; } }
  ::selection { background:var(--lime); color:var(--ink); }
</style>
</head>
<body>
<div class="brand">
  <span class="badge mono">LAB</span>
  <div>
    <div class="kicker mono">Science Class</div>
    <div class="title">정환쌤과 함께하는 과학 수업</div>
  </div>
</div>
<div class="card" id="card">
  <div class="icon pulse">⏳</div>
  <h1>구글 드라이브 연결 중…</h1>
  <p class="muted">잠시만 기다려 주세요.</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/db.js?v=20260710a"></script>
<script>
(function () {
  const card = document.getElementById('card');
  const params = new URLSearchParams(location.search);
  const code = params.get('code');
  const stateParam = params.get('state');
  const err = params.get('error');
  const redirectUri = location.origin + location.pathname; // 이 콜백 URL (authurl 때와 동일해야 함)
  const returnTo = sessionStorage.getItem('drive_return_to') || '과목-선택.html';

  function show(icon, title, msg, btnText, btnHref) {
    card.innerHTML = `<div class="icon">${icon}</div><h1>${title}</h1><p>${msg}</p>` +
      (btnText ? `<a class="btn" href="${btnHref}">${btnText}</a>` : '');
  }

  (async () => {
    if (err) { show('⚠️', '연결이 취소되었어요', '구글 인증이 취소되었거나 오류가 발생했습니다. (' + err + ')', '돌아가기', returnTo); return; }
    if (!code) { show('⚠️', '잘못된 접근', '인증 코드가 없습니다.', '돌아가기', returnTo); return; }
    const savedState = sessionStorage.getItem('drive_oauth_state');
    if (savedState && stateParam && savedState !== stateParam) { show('⚠️', '보안 확인 실패', '요청이 일치하지 않습니다. 다시 시도해 주세요.', '돌아가기', returnTo); return; }
    try {
      const { data: { session } } = await window.DB.supabase.auth.getSession();
      if (!session) { show('🔒', '로그인이 필요해요', '관리자로 로그인한 뒤 다시 연결해 주세요.', '학생/교사 로그인', '학생-로그인.html'); return; }
      const out = await window.DB.driveExchange(code, redirectUri);
      sessionStorage.removeItem('drive_oauth_state');
      show('✅', '구글 드라이브 연결 완료!', (out.email ? ('연결된 계정: <b>' + out.email + '</b><br>') : '') + '이제 학생 제출 파일이 선생님 드라이브에 저장됩니다.', '산출물 제출로 돌아가기', returnTo);
    } catch (e) {
      show('⚠️', '연결 실패', (e.message || '알 수 없는 오류') + '', '다시 시도', returnTo);
    }
  })();
})();
</script>
</body>
</html>
