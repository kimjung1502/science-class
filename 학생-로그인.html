<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>학생 로그인 · 정환쌤과 함께하는 과학 수업</title>

<!-- 실험노트 테마: Pretendard + Space Mono -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<script src="js/theme.js?v=20260724b"></script>
</head>
<body class="font-sans text-ink antialiased min-h-screen flex flex-col">

<!-- 상단 헤더 -->
<header class="sticky top-0 z-50 border-b border-ink/15 bg-paper/85 backdrop-blur-md">
  <div class="mx-auto max-w-6xl px-5 py-3 flex items-center gap-3">
    <span class="inline-flex h-9 w-9 items-center justify-center rounded-md bg-ink text-lime font-mono text-sm font-bold">LAB</span>
    <div class="leading-tight">
      <div class="font-mono text-[11px] uppercase tracking-[0.2em] text-signal">Science Class</div>
      <h1 class="font-bold tracking-tightest text-[15px] sm:text-[16px]">정환쌤과 함께하는 과학 수업</h1>
    </div>
  </div>
</header>

<main class="flex-grow mx-auto w-full max-w-6xl px-5 py-10 sm:py-14 flex items-center">
  <div class="w-full grid gap-8 lg:grid-cols-[1.05fr_.95fr] items-stretch">

    <!-- 좌: 브랜드/일러스트 패널 -->
    <div class="relative overflow-hidden rounded-2xl bg-ink text-paper p-8 sm:p-10 shadow-lift hidden lg:block">
      <div class="pointer-events-none absolute inset-0 opacity-[0.16]"
           style="background-image:linear-gradient(to right,#fff 1px,transparent 1px),linear-gradient(to bottom,#fff 1px,transparent 1px);background-size:30px 30px;"></div>
      <div class="relative">
        <div class="font-mono text-[11px] tracking-[0.25em] text-lime uppercase">Science Class · 2026</div>
        <h2 class="mt-3 text-3xl sm:text-4xl font-extrabold tracking-tightest leading-[1.12]">
          관찰하고, 기록하고,<br><span class="text-lime">증명한다.</span>
        </h2>
        <p class="mt-4 max-w-sm text-[14px] leading-relaxed text-paper/75">
          우리 반 과학의 모든 흔적이 이 노트 한 권에 담깁니다. 이름과 비밀번호로 나의 과학 노트를 펼쳐보세요.
        </p>

        <!-- 손그림풍 비커 + 원자 라인 일러스트 -->
        <svg class="relative mt-8 w-full max-w-[360px]" viewBox="0 0 360 180" fill="none" aria-hidden="true">
          <g stroke="#C4E000" stroke-width="1.6">
            <ellipse cx="272" cy="70" rx="58" ry="22"/>
            <ellipse cx="272" cy="70" rx="58" ry="22" transform="rotate(60 272 70)"/>
            <ellipse cx="272" cy="70" rx="58" ry="22" transform="rotate(120 272 70)"/>
          </g>
          <circle cx="272" cy="70" r="6" fill="#FF5B24"/>
          <circle cx="330" cy="70" r="3.5" fill="#C4E000"/>
          <circle cx="243" cy="45" r="3.5" fill="#C4E000"/>
          <circle cx="243" cy="95" r="3.5" fill="#C4E000"/>
          <g stroke="#FBFAF6" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round">
            <path d="M60 26 h40 M68 26 v34 L40 132 a14 14 0 0 0 13 20 h54 a14 14 0 0 0 13 -20 L92 60 V26"/>
          </g>
          <path d="M48 108 L52 118 a14 14 0 0 0 13 12 h30 a14 14 0 0 0 13 -12 L112 108 a40 12 0 0 1 -64 0 Z" fill="#C4E000" opacity="0.9"/>
          <circle cx="66" cy="96" r="3" fill="#C4E000"/>
          <circle cx="90" cy="86" r="2.2" fill="#C4E000"/>
          <circle cx="78" cy="104" r="2.6" fill="#FF5B24"/>
          <path d="M140 40 h150" stroke="#fff" stroke-width="1" stroke-dasharray="3 5" opacity="0.35"/>
        </svg>

        <div class="mt-8 flex flex-wrap gap-2 font-mono text-[11px]">
          <span class="rounded border border-lime/40 px-2 py-1 text-lime">#관찰</span>
          <span class="rounded border border-paper/25 px-2 py-1 text-paper/70">#기록</span>
          <span class="rounded border border-paper/25 px-2 py-1 text-paper/70">#탐구</span>
        </div>
      </div>
    </div>

    <!-- 우: 로그인 폼 카드 -->
    <div class="relative w-full max-w-md mx-auto lg:max-w-none">
      <span class="tape rot-1 absolute -top-3 left-8 z-10 px-4 py-1 font-mono text-[11px] font-bold uppercase tracking-widest">student login</span>

      <div class="card rounded-2xl p-7 sm:p-9 shadow-note h-full">
        <h2 class="text-2xl font-extrabold tracking-tightest">학생 로그인</h2>
        <p class="mt-1.5 text-[13.5px] text-ink3">이름과 비밀번호로 나의 과학 노트를 펼쳐보세요.</p>

        <form id="login-form" class="mt-7 space-y-5">
          <!-- 아이디 -->
          <label class="block" for="student-id">
            <span class="font-mono text-[11px] font-bold uppercase tracking-[0.18em] text-ink3">01 · 아이디 <span class="text-signal">(이름)</span></span>
            <div class="mt-2 relative">
              <span class="pointer-events-none absolute inset-y-0 left-3 flex items-center text-ink3/70">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21a8 8 0 1 0-16 0"/><circle cx="12" cy="7" r="4"/></svg>
              </span>
              <input class="w-full rounded-lg border-faint bg-paper/60 pl-10 pr-3 py-2.5 text-[15px] text-ink placeholder:text-ink3/50 focus:border-ink focus:ring-2 focus:ring-lime/70"
                     id="student-id" autocomplete="username" placeholder="이름을 입력하세요 (예: 김능곡)" type="text" required>
            </div>
          </label>

          <!-- 비밀번호 -->
          <label class="block" for="student-password">
            <span class="font-mono text-[11px] font-bold uppercase tracking-[0.18em] text-ink3">02 · 비밀번호 <span class="text-signal">(처음엔 학번)</span></span>
            <div class="mt-2 relative">
              <span class="pointer-events-none absolute inset-y-0 left-3 flex items-center text-ink3/70">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </span>
              <input class="w-full rounded-lg border-faint bg-paper/60 pl-10 pr-16 py-2.5 text-[15px] tracking-widest text-ink placeholder:text-ink3/50 focus:border-ink focus:ring-2 focus:ring-lime/70"
                     id="student-password" autocomplete="current-password" placeholder="비밀번호를 입력하세요" type="password" required>
              <button class="absolute inset-y-0 right-2 my-1.5 flex items-center gap-1 rounded-md px-2 font-mono text-[11px] text-ink3 hover:bg-paper2 transition" type="button" id="toggle-pw" aria-label="비밀번호 표시">
                <span id="pw-eye" class="inline-flex"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg></span>
                <span id="pw-eye-txt">표시</span>
              </button>
            </div>
          </label>

          <p id="login-error" class="font-mono text-[12px] text-error hidden"></p>

          <!-- 로그인 버튼 -->
          <button class="lift-hover group w-full rounded-lg bg-lime px-4 py-3.5 text-[15px] font-extrabold text-ink shadow-note hover:shadow-lift active:translate-y-0 disabled:opacity-60 flex items-center justify-center gap-1"
                  type="submit" id="login-btn">
            <span id="login-label" class="tracking-tight">로그인</span>
            <span class="inline-block transition-transform group-hover:translate-x-1">→</span>
          </button>

          <!-- 안내문 -->
          <div class="dashed pt-4 flex gap-2.5 text-[12.5px] leading-relaxed text-ink3">
            <svg class="mt-[3px] shrink-0 text-signal" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
            <p>처음 로그인하는 경우 비밀번호는 <span class="hl font-semibold">학번</span>입니다. 로그인 후 새 비밀번호로 바꿔주세요. 문의는 <span class="font-semibold">정환쌤</span>께 해주세요.</p>
          </div>
        </form>
      </div>
    </div>

  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/db.js?v=20260710a"></script>
<script>
(function () {
  const { supabase, studentSignIn, currentStudent } = window.DB;

  const $ = (id) => document.getElementById(id);

  // 이미 (유효하게) 로그인돼 있으면 통과
  (async () => {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) return;
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) { await supabase.auth.signOut(); return; } // 죽은 세션 정리 후 로그인 화면 유지
    const s = await currentStudent();
    location.replace(s && s.must_change_password ? '비밀번호-변경.html' : '과목-선택.html');
  })();

  // 비밀번호 표시 토글
  const EYE = '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>';
  const EYE_OFF = '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9.9 4.24A9.1 9.1 0 0 1 12 4c6.5 0 10 8 10 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><path d="M6.61 6.61A18.5 18.5 0 0 0 2 12s3.5 7 10 7a9.1 9.1 0 0 0 5.39-1.61"/><path d="M2 2l20 20"/></svg>';
  $('toggle-pw').addEventListener('click', function () {
    const input = $('student-password');
    const show = input.type === 'password';
    input.type = show ? 'text' : 'password';
    $('pw-eye').innerHTML = show ? EYE_OFF : EYE;
    $('pw-eye-txt').textContent = show ? '숨김' : '표시';
  });

  $('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    $('login-error').classList.add('hidden');
    const id = $('student-id').value.trim();
    const pw = $('student-password').value;
    const btn = $('login-btn'); btn.disabled = true; $('login-label').textContent = '로그인 중…';
    const fail = (msg) => { $('login-error').textContent = msg; $('login-error').classList.remove('hidden'); btn.disabled = false; $('login-label').textContent = '로그인'; };

    // 1) 학생으로 로그인 시도
    try {
      await studentSignIn(id, pw);
      const s = await currentStudent();
      location.replace(s && s.must_change_password ? '비밀번호-변경.html' : '과목-선택.html');
      return;
    } catch (_) { /* 학생이 아니거나 실패 → 관리자로 시도 */ }

    // 2) 관리자(교사)로 로그인 시도 → 성공하면 학생 화면을 교사 시점으로 보여줌
    const email = id.includes('@') ? id : `${id}@science-class.local`;
    const { error } = await supabase.auth.signInWithPassword({ email, password: pw });
    if (!error) {
      const { data: isAdmin } = await supabase.rpc('is_admin');
      if (isAdmin) { location.replace('과목-선택.html'); return; }
      await supabase.auth.signOut(); // 학생도 관리자도 아님
    }
    fail('아이디 또는 비밀번호를 확인하세요.');
  });
})();
</script>

</body>
</html>
