<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/db.js?v=20260710a"></script>
<script>
(function () {
  const {
    supabase, requireLogin, signOut, esc,
    fetchSubjectTree, fetchQuestions, fetchQuestion, fetchAnswers,
    createQuestion, createAnswer, deleteQuestion, deleteAnswer, incrementQuestionViews,
  } = window.DB;

  const $ = (id) => document.getElementById(id);
  const params = new URLSearchParams(location.search);
  const subjectId = params.get('subject');

  const state = { subject: null, isAdmin: false, viewerName: '', viewerId: null, filter: 'all', search: '', questions: [] };
  // 단원 조회용 인덱스 (id → {name, 부모})
  const topic = { units: new Map(), mids: new Map(), subs: new Map() };
  // 사이드바 아코디언 펼침 상태
  const sb = { openUnit: null, openMid: null };

  function indexTree(tree) {
    (tree.units || []).forEach((u) => {
      topic.units.set(u.id, u);
      (u.mid_units || []).forEach((m) => {
        topic.mids.set(m.id, Object.assign({ unit: u }, m));
        (m.subunits || []).forEach((s) => topic.subs.set(s.id, Object.assign({ unit: u, mid: m }, s)));
      });
    });
  }

  // 질문에 연결된 단원 경로 이름 배열 (활성 단원만)
  function topicPath(q) {
    const parts = [];
    if (q.unit_id && topic.units.has(q.unit_id)) parts.push(topic.units.get(q.unit_id).name);
    if (q.mid_unit_id && topic.mids.has(q.mid_unit_id)) parts.push(topic.mids.get(q.mid_unit_id).name);
    if (q.subunit_id && topic.subs.has(q.subunit_id)) parts.push(topic.subs.get(q.subunit_id).name);
    return parts;
  }

  function topicChip(q) {
    const parts = topicPath(q);
    if (!parts.length) return '';
    return `<span class="inline-flex items-center gap-1 px-2.5 py-1 bg-paper2 text-ink3 font-mono text-[11px] rounded-full max-w-full">
      <span class="material-symbols-outlined text-[15px] text-signal shrink-0">account_tree</span>
      <span class="truncate">${parts.map(esc).join(' › ')}</span>
    </span>`;
  }

  // ---------- 사이드바 단원 트리 ----------
  function subLink(s) {
    return `<a href="단원-상세.html?subject=${encodeURIComponent(subjectId)}&sub=${encodeURIComponent(s.id)}" class="flex items-center gap-2 p-2 rounded-lg text-[12.5px] text-ink hover:bg-paper3 transition-all">
      <span class="material-symbols-outlined text-[16px] text-ink3/70">radio_button_unchecked</span><span>${esc(s.name)}</span>
    </a>`;
  }

  function renderSidebarNav() {
    const nav = $('sidebar-nav');
    const units = state.subject.units || [];
    nav.innerHTML = units.map((u) => {
      const unitOpen = u.id === sb.openUnit;
      const midsHtml = unitOpen ? (u.mid_units || []).map((m) => {
        const on = m.id === sb.openMid;
        const subs = (m.subunits || []).map(subLink).join('') || '<p class="text-[12px] text-ink3 p-2">소단원이 없습니다.</p>';
        return `<div>
          <button data-mid="${m.id}" class="sb-mid w-full flex items-center justify-between px-3 py-2.5 rounded-lg text-left transition-all ${on ? 'bg-ink text-paper font-bold' : 'text-ink3 hover:bg-paper3'}">
            <span class="text-[13.5px]">${esc(m.name)}</span>
            <span class="material-symbols-outlined text-[17px] arrow ${on ? 'rotate-180 text-lime' : ''}">expand_more</span>
          </button>
          ${on ? `<div class="mt-1 ml-4 space-y-0.5 swap-in">${subs}</div>` : ''}
        </div>`;
      }).join('') : '';
      return `<div>
        <button data-unit="${u.id}" class="sb-unit w-full flex items-center justify-between px-3 py-2.5 rounded-lg hover:bg-paper3 text-left transition-all">
          <span class="text-[13.5px] font-bold ${unitOpen ? 'text-signal' : 'text-ink'}">${esc(u.name)}</span>
          <span class="material-symbols-outlined text-[17px] arrow text-ink3/70 ${unitOpen ? 'rotate-180' : ''}">expand_more</span>
        </button>
        ${unitOpen ? `<div class="mt-1 space-y-1 swap-in">${midsHtml}</div>` : ''}
      </div>`;
    }).join('');

    nav.querySelectorAll('.sb-unit').forEach((btn) => btn.addEventListener('click', () => {
      const id = btn.dataset.unit;
      if (sb.openUnit === id) { sb.openUnit = null; sb.openMid = null; }
      else { sb.openUnit = id; sb.openMid = null; }
      renderSidebarNav();
    }));
    nav.querySelectorAll('.sb-mid').forEach((btn) => btn.addEventListener('click', () => {
      const id = btn.dataset.mid;
      sb.openMid = (sb.openMid === id) ? null : id;
      renderSidebarNav();
    }));
  }

  const fmtDate = (iso) => {
    const d = new Date(iso);
    if (isNaN(d)) return '';
    const p = (n) => String(n).padStart(2, '0');
    return `${d.getFullYear()}.${p(d.getMonth() + 1)}.${p(d.getDate())}`;
  };
  const nl2br = (s) => esc(s).replace(/\n/g, '<br>');

  // ---------- 목록 ----------
  function statusPill(answered) {
    return answered
      ? '<span class="px-2.5 py-1 bg-lime-soft text-ink font-mono text-[11px] font-bold rounded-full">답변 완료</span>'
      : '<span class="px-2.5 py-1 bg-signal-soft text-signal font-mono text-[11px] font-bold rounded-full">답변 대기</span>';
  }

  function questionCard(q) {
    const answered = q.answer_count > 0;
    return `<div data-qid="${q.id}" class="q-card lift-hover group card p-5 rounded-xl shadow-note hover:shadow-lift ${answered ? 'border-l-[3px] border-l-lime' : 'border-l-[3px] border-l-signal'} cursor-pointer">
      <div class="flex justify-between items-start gap-3 mb-2">
        <div class="flex flex-wrap items-center gap-2 min-w-0">${statusPill(answered)}${topicChip(q)}</div>
        <span class="font-mono text-[11px] text-ink3 shrink-0">${fmtDate(q.created_at)}</span>
      </div>
      <h3 class="text-lg font-extrabold tracking-tight text-ink mb-3 group-hover:text-signal transition-colors break-words">${esc(q.title)}</h3>
      <div class="dashed pt-3 flex items-center justify-between text-ink3">
        <div class="flex items-center gap-2 min-w-0">
          <span class="material-symbols-outlined text-[19px] text-ink3">account_circle</span>
          <span class="text-[13px] text-ink2 font-medium truncate">${esc(q.author_name || '학생')}</span>
        </div>
        <div class="flex items-center gap-4 font-mono text-[12px] shrink-0">
          <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[17px]">chat_bubble_outline</span>${q.answer_count}</span>
          <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[17px]">visibility</span>${q.view_count || 0}</span>
        </div>
      </div>
    </div>`;
  }

  function filteredQuestions() {
    const term = state.search.trim().toLowerCase();
    return state.questions.filter((q) => {
      if (state.filter === 'waiting' && q.answer_count > 0) return false;
      if (state.filter === 'answered' && q.answer_count === 0) return false;
      if (term && !((q.title || '').toLowerCase().includes(term) || (q.body || '').toLowerCase().includes(term))) return false;
      return true;
    });
  }

  function renderList() {
    const list = $('question-list');
    const items = filteredQuestions();
    if (!state.questions.length) {
      list.innerHTML = `<div class="text-center py-16 px-6 card rounded-xl shadow-note">
        <div class="w-16 h-16 mx-auto rounded-2xl bg-lime-soft flex items-center justify-center mb-4">
          <span class="material-symbols-outlined text-[34px] text-ink">forum</span>
        </div>
        <p class="text-lg font-extrabold tracking-tight text-ink">아직 등록된 질문이 없습니다</p>
        <p class="text-[14px] text-ink3 mt-1 mb-5">궁금한 점이 있다면 가장 먼저 질문을 남겨보세요!</p>
        <button id="empty-ask" class="px-5 py-2.5 bg-ink text-paper rounded-lg font-extrabold text-[14px] inline-flex items-center gap-2 shadow-note hover:shadow-lift transition-all"><span class="material-symbols-outlined text-[19px]">edit_square</span>질문하기</button>
      </div>`;
      $('empty-ask')?.addEventListener('click', openWrite);
      return;
    }
    if (!items.length) {
      list.innerHTML = '<p class="text-ink3 py-10 text-center">조건에 맞는 질문이 없습니다.</p>';
      return;
    }
    list.innerHTML = items.map(questionCard).join('');
    list.querySelectorAll('.q-card').forEach((c) => c.addEventListener('click', () => go(c.dataset.qid)));
  }

  async function loadList() {
    try {
      state.questions = await fetchQuestions(subjectId);
      renderList();
    } catch (e) {
      $('question-list').innerHTML = `<p class="text-error py-10 text-center font-mono text-[13px]">질문을 불러오지 못했습니다. (${esc(e.message)})</p>`;
    }
  }

  // ---------- 상세 ----------
  function answerCard(a) {
    const del = state.isAdmin
      ? `<button data-aid="${a.id}" class="ans-del font-mono text-[11px] text-ink3 hover:text-error flex items-center gap-1"><span class="material-symbols-outlined text-[15px]">delete</span>삭제</button>`
      : '';
    return `<div class="rounded-xl p-5 bg-lime-soft/50 border border-lime/40 border-l-[3px] border-l-lime">
      <div class="flex items-center justify-between mb-2.5 gap-2 flex-wrap">
        <div class="flex items-center gap-2">
          <span class="material-symbols-outlined text-ink text-[20px]">verified</span>
          <span class="text-[14px] font-extrabold text-ink">${esc(a.author_name || '선생님')}</span>
          <span class="font-mono text-[10px] font-bold text-lime bg-ink px-2 py-0.5 rounded-full">교사 답변</span>
        </div>
        <div class="flex items-center gap-3">
          <span class="font-mono text-[11px] text-ink3">${fmtDate(a.created_at)}</span>
          ${del}
        </div>
      </div>
      <p class="text-[15px] leading-relaxed text-ink whitespace-pre-wrap break-words">${nl2br(a.body)}</p>
    </div>`;
  }

  async function showDetail(qid) {
    $('list-view').classList.add('hidden');
    const view = $('detail-view');
    view.classList.remove('hidden');
    view.innerHTML = '<p class="text-ink3 py-10 text-center">불러오는 중…</p>';
    window.scrollTo({ top: 0 });

    let q, answers;
    try {
      q = await fetchQuestion(qid);
      if (!q) { view.innerHTML = '<p class="text-ink3 py-10 text-center">질문을 찾을 수 없습니다.</p><div class="text-center"><button id="d-back" class="mt-2 text-signal font-bold">← 목록으로</button></div>'; $('d-back').addEventListener('click', () => go(null)); return; }
      incrementQuestionViews(qid); // 조회수 (실패 무시)
      answers = await fetchAnswers(qid);
    } catch (e) {
      view.innerHTML = `<p class="text-error py-10 text-center font-mono text-[13px]">불러오지 못했습니다. (${esc(e.message)})</p>`;
      return;
    }

    const canDeleteQ = state.isAdmin || (state.viewerId && q.author_id === state.viewerId);
    const answered = answers.length > 0;

    view.innerHTML = `
      <button id="d-back" class="mb-5 inline-flex items-center gap-1 text-ink3 hover:text-signal text-[13px] font-bold">
        <span class="material-symbols-outlined text-[19px]">arrow_back</span>목록으로
      </button>

      <article class="card rounded-xl shadow-note p-6 md:p-8 mb-6 swap-in border-l-[3px] ${answered ? 'border-l-lime' : 'border-l-signal'}">
        <div class="flex items-center justify-between gap-3 mb-3">
          <div class="flex flex-wrap items-center gap-2 min-w-0">${statusPill(answered)}${topicChip(q)}</div>
          ${canDeleteQ ? '<button id="q-del" class="font-mono text-[11px] text-ink3 hover:text-error flex items-center gap-1 shrink-0"><span class="material-symbols-outlined text-[16px]">delete</span>질문 삭제</button>' : ''}
        </div>
        <h2 class="text-2xl font-extrabold tracking-tightest text-ink mb-3 break-words">${esc(q.title)}</h2>
        <div class="flex items-center gap-3 text-ink3 mb-5 pb-5 dashed">
          <span class="flex items-center gap-1 text-[13px] text-ink2 font-medium"><span class="material-symbols-outlined text-[19px] text-ink3">account_circle</span>${esc(q.author_name || '학생')}</span>
          <span class="text-ink3/50">·</span><span class="font-mono text-[12px]">${fmtDate(q.created_at)}</span>
          <span class="text-ink3/50">·</span><span class="flex items-center gap-1 font-mono text-[12px]"><span class="material-symbols-outlined text-[17px]">visibility</span>${q.view_count || 0}</span>
        </div>
        <p class="text-[15px] leading-relaxed text-ink whitespace-pre-wrap break-words">${nl2br(q.body)}</p>
      </article>

      <div class="flex items-center gap-3 mb-4">
        <h3 class="text-lg font-extrabold tracking-tight text-ink flex items-center gap-2"><span class="material-symbols-outlined text-signal text-[22px]">forum</span>답변 <span class="text-signal">${answers.length}</span></h3>
        <span class="flex-1 dashed"></span>
        <span class="font-mono text-[11px] uppercase tracking-[0.16em] text-ink3">Answers</span>
      </div>
      <div id="answer-list" class="space-y-3 mb-6">
        ${answers.length ? answers.map(answerCard).join('') : '<p class="text-ink3 text-center py-10 card rounded-xl border-dashed">아직 답변이 없습니다. 선생님의 답변을 기다려주세요.</p>'}
      </div>

      ${state.isAdmin ? `
      <form id="answer-form" class="card rounded-xl shadow-note p-5">
        <label for="a-body" class="font-mono text-[11px] font-bold uppercase tracking-[0.16em] text-ink3 flex items-center gap-2 mb-2"><span class="material-symbols-outlined text-signal text-[18px]">reply</span>답변 작성 (교사)</label>
        <textarea id="a-body" rows="4" required placeholder="학생에게 전달할 답변을 작성하세요." class="w-full px-4 py-3 rounded-lg border-faint bg-paper/60 outline-none text-[15px] text-ink placeholder:text-ink3/50 focus:border-ink focus:ring-2 focus:ring-lime/70 resize-y"></textarea>
        <p id="answer-error" class="font-mono text-[12px] text-error hidden mt-1"></p>
        <div class="flex justify-end mt-3">
          <button type="submit" id="answer-submit" class="px-5 py-2.5 rounded-lg bg-lime text-ink font-extrabold shadow-note hover:shadow-lift transition-all disabled:opacity-60">답변 등록</button>
        </div>
      </form>` : ''}
    `;

    $('d-back').addEventListener('click', () => go(null));
    if (canDeleteQ) $('q-del')?.addEventListener('click', async () => {
      if (!confirm('이 질문을 삭제하시겠습니까? 답변도 함께 삭제됩니다.')) return;
      try { await deleteQuestion(qid); go(null); } catch (e) { alert('삭제 실패: ' + e.message); }
    });
    view.querySelectorAll('.ans-del').forEach((b) => b.addEventListener('click', async () => {
      if (!confirm('이 답변을 삭제하시겠습니까?')) return;
      try { await deleteAnswer(b.dataset.aid); showDetail(qid); } catch (e) { alert('삭제 실패: ' + e.message); }
    }));
    if (state.isAdmin) $('answer-form')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const body = $('a-body').value.trim();
      if (!body) return;
      const btn = $('answer-submit'); btn.disabled = true;
      try {
        await createAnswer({ questionId: qid, body, authorName: state.viewerName });
        showDetail(qid);
      } catch (err) {
        const el = $('answer-error'); el.textContent = '등록 실패: ' + err.message; el.classList.remove('hidden');
        btn.disabled = false;
      }
    });
  }

  // ---------- 라우팅 ----------
  function go(qid) {
    const url = qid ? `?subject=${encodeURIComponent(subjectId)}&q=${encodeURIComponent(qid)}` : `?subject=${encodeURIComponent(subjectId)}`;
    history.pushState({}, '', url);
    route();
  }
  function route() {
    const qid = new URLSearchParams(location.search).get('q');
    if (qid) { showDetail(qid); }
    else { $('detail-view').classList.add('hidden'); $('detail-view').innerHTML = ''; $('list-view').classList.remove('hidden'); loadList(); }
  }
  window.addEventListener('popstate', route);

  // ---------- 작성 모달 · 단원 드롭다운 ----------
  function fillSelect(sel, items, placeholder) {
    sel.innerHTML = `<option value="">${placeholder}</option>` + (items || []).map((x) => `<option value="${x.id}">${esc(x.name)}</option>`).join('');
  }
  function populateUnits() {
    fillSelect($('q-unit'), state.subject.units || [], '대단원 전체');
    resetMidSub();
  }
  function resetMidSub() {
    fillSelect($('q-mid'), [], '중단원 전체'); $('q-mid').disabled = true;
    fillSelect($('q-sub'), [], '소단원 전체'); $('q-sub').disabled = true;
  }

  function openWrite() {
    $('write-error').classList.add('hidden');
    $('q-title').value = ''; $('q-body').value = '';
    $('q-unit').value = ''; resetMidSub();
    $('write-modal').classList.remove('hidden');
    $('q-title').focus();
  }
  function closeWrite() { $('write-modal').classList.add('hidden'); }

  // ---------- 시작 ----------
  (async () => {
    const auth = await requireLogin();
    if (!auth) return;
    if (!subjectId) { location.replace('과목-선택.html'); return; }

    state.isAdmin = !auth.student;
    state.viewerName = auth.student ? auth.student.name : '선생님';
    const { data: { user } } = await supabase.auth.getUser();
    state.viewerId = user ? user.id : null;

    $('who').textContent = auth.student ? auth.student.name : '관리자';
    if (state.isAdmin) $('teacher-badge').classList.remove('hidden');
    $('logout-btn').addEventListener('click', async () => { await signOut(); location.replace('학생-로그인.html'); });

    try {
      state.subject = await fetchSubjectTree(subjectId); // 이름·accent + 단원 트리(사이드바/드롭다운/태그용)
    } catch (_) { state.subject = null; }
    if (!state.subject) {
      $('list-view').innerHTML = '<p class="text-center text-ink3 py-16">이 과목에 접근할 권한이 없습니다.</p>';
      return;
    }
    indexTree(state.subject);
    populateUnits();
    document.title = `질의응답 · ${state.subject.name}`;
    $('subject-title').textContent = state.subject.name;
    $('crumb-subject').textContent = state.subject.name;
    $('crumb-subject').href = `과목-홈.html?subject=${encodeURIComponent(subjectId)}`;
    $('home-link').href = `과목-홈.html?subject=${encodeURIComponent(subjectId)}`;
    $('assess-link').href = `수행평가-공지.html?subject=${encodeURIComponent(subjectId)}`;
    $('submit-link').href = `산출물-제출.html?subject=${encodeURIComponent(subjectId)}`;
    $('list-subtitle').textContent = `${state.subject.name} 과목에 대해 자유롭게 질문하고 선생님의 답변을 확인하세요.`;

    // 사이드바: 특정 단원을 보는 페이지가 아니므로 강조 없이 접힌 상태로 시작
    sb.openUnit = null;
    sb.openMid = null;
    renderSidebarNav();

    // 이벤트 바인딩
    $('ask-btn').addEventListener('click', openWrite);
    $('write-close').addEventListener('click', closeWrite);
    $('write-cancel').addEventListener('click', closeWrite);
    $('write-backdrop').addEventListener('click', closeWrite);
    document.querySelectorAll('.fixed-link').forEach((a) => a.addEventListener('click', (e) => e.preventDefault())); // 미구현 링크
    // 모바일 사이드바 서랍
    const openSidebar = () => { $('sidebar').classList.add('drawer-open'); $('sidebar-backdrop').classList.remove('hidden'); };
    const closeSidebar = () => { $('sidebar').classList.remove('drawer-open'); $('sidebar-backdrop').classList.add('hidden'); };
    $('menu-btn').addEventListener('click', openSidebar);
    $('sidebar-close').addEventListener('click', closeSidebar);
    $('sidebar-backdrop').addEventListener('click', closeSidebar);
    // 단원 연쇄 드롭다운
    $('q-unit').addEventListener('change', () => {
      const u = topic.units.get($('q-unit').value);
      fillSelect($('q-mid'), u && u.mid_units, '중단원 전체'); $('q-mid').disabled = !u;
      fillSelect($('q-sub'), [], '소단원 전체'); $('q-sub').disabled = true;
    });
    $('q-mid').addEventListener('change', () => {
      const m = topic.mids.get($('q-mid').value);
      fillSelect($('q-sub'), m && m.subunits, '소단원 전체'); $('q-sub').disabled = !m;
    });
    $('search-input').addEventListener('input', (e) => { state.search = e.target.value; renderList(); });
    document.querySelectorAll('.filter-chip').forEach((chip) => chip.addEventListener('click', () => {
      state.filter = chip.dataset.filter;
      document.querySelectorAll('.filter-chip').forEach((c) => {
        const on = c === chip;
        c.classList.toggle('border-ink', on);
        c.classList.toggle('bg-ink', on);
        c.classList.toggle('text-paper', on);
        c.classList.toggle('font-bold', on);
        c.classList.toggle('border-faint', !on);
        c.classList.toggle('text-ink3', !on);
      });
      renderList();
    }));
    $('write-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const title = $('q-title').value.trim();
      const body = $('q-body').value.trim();
      if (!title || !body) return;
      const btn = $('write-submit'); btn.disabled = true; $('write-submit-label').textContent = '등록 중…';
      try {
        const { id } = await createQuestion({
          subjectId, title, body, authorName: state.viewerName,
          unitId: $('q-unit').value, midUnitId: $('q-mid').value, subunitId: $('q-sub').value,
        });
        closeWrite();
        go(id);
      } catch (err) {
        const el = $('write-error'); el.textContent = '등록 실패: ' + err.message; el.classList.remove('hidden');
        btn.disabled = false; $('write-submit-label').textContent = '등록';
      }
    });

    route(); // 초기 화면 (목록 또는 상세)
  })();
})();
</script>

</body>
</html>
