<script src="js/db.js?v=20260705a"></script>
<script>
(function () {
  const {
    supabase, requireLogin, signOut, esc,
    fetchSubjectTree, fetchQuestions, fetchQuestion, fetchAnswers,
    createQuestion, createAnswer, deleteQuestion, deleteAnswer, incrementQuestionViews,
  } = window.DB;

  const $ = (id) => document.getElementById(id);
  const params = new URLSearchParams(location.search);
  const subjectId = params.get('subject');

  const state = { subject: null, isAdmin: false, viewerName: '', viewerId: null, filter: 'all', search: '', questions: [] };
  // 단원 조회용 인덱스 (id → {name, 부모})
  const topic = { units: new Map(), mids: new Map(), subs: new Map() };
  // 사이드바 아코디언 펼침 상태
  const sb = { openUnit: null, openMid: null };

  function indexTree(tree) {
    (tree.units || []).forEach((u) => {
      topic.units.set(u.id, u);
      (u.mid_units || []).forEach((m) => {
        topic.mids.set(m.id, Object.assign({ unit: u }, m));
        (m.subunits || []).forEach((s) => topic.subs.set(s.id, Object.assign({ unit: u, mid: m }, s)));
      });
    });
  }

  // 질문에 연결된 단원 경로 이름 배열 (활성 단원만)
  function topicPath(q) {
    const parts = [];
    if (q.unit_id && topic.units.has(q.unit_id)) parts.push(topic.units.get(q.unit_id).name);
    if (q.mid_unit_id && topic.mids.has(q.mid_unit_id)) parts.push(topic.mids.get(q.mid_unit_id).name);
    if (q.subunit_id && topic.subs.has(q.subunit_id)) parts.push(topic.subs.get(q.subunit_id).name);
    return parts;
  }

  function topicChip(q) {
    const parts = topicPath(q);
    if (!parts.length) return '';
    return `<span class="inline-flex items-center gap-1 px-2.5 py-1 bg-surface-container text-on-surface-variant text-caption rounded-full max-w-full">
      <span class="material-symbols-outlined text-[16px] text-primary shrink-0">account_tree</span>
      <span class="truncate">${parts.map(esc).join(' › ')}</span>
    </span>`;
  }

  // ---------- 사이드바 단원 트리 ----------
  function subLink(s) {
    return `<a href="단원-상세.html?subject=${encodeURIComponent(subjectId)}&sub=${encodeURIComponent(s.id)}" class="flex items-center gap-2 p-2 rounded-lg text-caption text-on-surface hover:bg-surface-container-highest transition-all">
      <span class="material-symbols-outlined text-[18px] text-outline">radio_button_unchecked</span><span>${esc(s.name)}</span>
    </a>`;
  }

  function renderSidebarNav() {
    const nav = $('sidebar-nav');
    const units = state.subject.units || [];
    nav.innerHTML = units.map((u) => {
      const unitOpen = u.id === sb.openUnit;
      const midsHtml = unitOpen ? (u.mid_units || []).map((m) => {
        const on = m.id === sb.openMid;
        const subs = (m.subunits || []).map(subLink).join('') || '<p class="text-caption text-on-surface-variant p-2">소단원이 없습니다.</p>';
        return `<div>
          <button data-mid="${m.id}" class="sb-mid w-full flex items-center justify-between p-3 rounded-lg text-left transition-all ${on ? 'bg-secondary-container text-on-secondary-container font-bold' : 'text-on-surface-variant hover:bg-surface-container-highest'}">
            <span class="text-label-md">${esc(m.name)}</span>
            <span class="material-symbols-outlined text-[18px] arrow ${on ? 'rotate-180' : ''}">expand_more</span>
          </button>
          ${on ? `<div class="mt-1 ml-4 space-y-0.5 swap-in">${subs}</div>` : ''}
        </div>`;
      }).join('') : '';
      return `<div>
        <button data-unit="${u.id}" class="sb-unit w-full flex items-center justify-between p-3 rounded-lg hover:bg-surface-container-highest text-left transition-all">
          <span class="text-label-md font-bold ${unitOpen ? 'text-primary' : 'text-on-surface-variant'}">${esc(u.name)}</span>
          <span class="material-symbols-outlined arrow text-outline ${unitOpen ? 'rotate-180' : ''}">expand_more</span>
        </button>
        ${unitOpen ? `<div class="mt-1 space-y-1 swap-in">${midsHtml}</div>` : ''}
      </div>`;
    }).join('');

    nav.querySelectorAll('.sb-unit').forEach((btn) => btn.addEventListener('click', () => {
      const id = btn.dataset.unit;
      if (sb.openUnit === id) { sb.openUnit = null; sb.openMid = null; }
      else { sb.openUnit = id; sb.openMid = null; }
      renderSidebarNav();
    }));
    nav.querySelectorAll('.sb-mid').forEach((btn) => btn.addEventListener('click', () => {
      const id = btn.dataset.mid;
      sb.openMid = (sb.openMid === id) ? null : id;
      renderSidebarNav();
    }));
  }

  const fmtDate = (iso) => {
    const d = new Date(iso);
    if (isNaN(d)) return '';
    const p = (n) => String(n).padStart(2, '0');
    return `${d.getFullYear()}.${p(d.getMonth() + 1)}.${p(d.getDate())}`;
  };
  const nl2br = (s) => esc(s).replace(/\n/g, '<br>');

  // ---------- 목록 ----------
  function statusPill(answered) {
    return answered
      ? '<span class="px-3 py-1 bg-emerald-100 text-emerald-700 text-caption font-bold rounded-full">답변 완료</span>'
      : '<span class="px-3 py-1 bg-amber-100 text-amber-700 text-caption font-bold rounded-full">답변 대기</span>';
  }

  function questionCard(q) {
    const answered = q.answer_count > 0;
    return `<div data-qid="${q.id}" class="q-card group bg-surface-container-lowest p-md rounded-xl border border-outline-variant hover:border-primary hover:shadow-md transition-all cursor-pointer">
      <div class="flex justify-between items-start gap-3 mb-2">
        <div class="flex flex-wrap items-center gap-2 min-w-0">${statusPill(answered)}${topicChip(q)}</div>
        <span class="text-caption text-outline shrink-0">${fmtDate(q.created_at)}</span>
      </div>
      <h3 class="text-title-lg text-on-surface mb-3 group-hover:text-primary transition-colors break-words">${esc(q.title)}</h3>
      <div class="flex items-center justify-between text-outline">
        <div class="flex items-center gap-2 min-w-0">
          <span class="material-symbols-outlined text-[20px] text-outline">account_circle</span>
          <span class="text-label-md text-on-surface-variant font-medium truncate">${esc(q.author_name || '학생')}</span>
        </div>
        <div class="flex items-center gap-4 text-label-md shrink-0">
          <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[18px]">chat_bubble_outline</span>${q.answer_count}</span>
          <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[18px]">visibility</span>${q.view_count || 0}</span>
        </div>
      </div>
    </div>`;
  }

  function filteredQuestions() {
    const term = state.search.trim().toLowerCase();
    return state.questions.filter((q) => {
      if (state.filter === 'waiting' && q.answer_count > 0) return false;
      if (state.filter === 'answered' && q.answer_count === 0) return false;
      if (term && !((q.title || '').toLowerCase().includes(term) || (q.body || '').toLowerCase().includes(term))) return false;
      return true;
    });
  }

  function renderList() {
    const list = $('question-list');
    const items = filteredQuestions();
    if (!state.questions.length) {
      list.innerHTML = `<div class="text-center py-20 px-md bg-surface-container-lowest border border-dashed border-outline-variant rounded-xl">
        <div class="w-16 h-16 mx-auto rounded-full bg-primary-fixed flex items-center justify-center mb-4">
          <span class="material-symbols-outlined text-[36px] text-primary">forum</span>
        </div>
        <p class="text-title-lg text-on-surface">아직 등록된 질문이 없습니다</p>
        <p class="text-body-md text-on-surface-variant mt-1 mb-md">궁금한 점이 있다면 가장 먼저 질문을 남겨보세요!</p>
        <button id="empty-ask" class="px-md py-2.5 bg-primary text-on-primary rounded-lg font-bold inline-flex items-center gap-2 hover:bg-primary-container transition-all active:scale-95"><span class="material-symbols-outlined">edit_square</span>질문하기</button>
      </div>`;
      $('empty-ask')?.addEventListener('click', openWrite);
      return;
    }
    if (!items.length) {
      list.innerHTML = '<p class="text-on-surface-variant py-lg text-center">조건에 맞는 질문이 없습니다.</p>';
      return;
    }
    list.innerHTML = items.map(questionCard).join('');
    list.querySelectorAll('.q-card').forEach((c) => c.addEventListener('click', () => go(c.dataset.qid)));
  }

  async function loadList() {
    try {
      state.questions = await fetchQuestions(subjectId);
      renderList();
    } catch (e) {
      $('question-list').innerHTML = `<p class="text-error py-lg text-center">질문을 불러오지 못했습니다. (${esc(e.message)})</p>`;
    }
  }

  // ---------- 상세 ----------
  function answerCard(a) {
    const del = state.isAdmin
      ? `<button data-aid="${a.id}" class="ans-del text-caption text-outline hover:text-error flex items-center gap-1"><span class="material-symbols-outlined text-[16px]">delete</span>삭제</button>`
      : '';
    return `<div class="bg-primary-fixed border border-primary/20 rounded-xl p-md">
      <div class="flex items-center justify-between mb-2">
        <div class="flex items-center gap-2">
          <span class="material-symbols-outlined text-primary" style="font-variation-settings:'FILL' 1;">verified</span>
          <span class="text-label-md font-bold text-on-primary-fixed">${esc(a.author_name || '선생님')}</span>
          <span class="text-caption text-white bg-primary px-2 py-0.5 rounded-full">교사 답변</span>
        </div>
        <div class="flex items-center gap-3">
          <span class="text-caption text-on-surface-variant">${fmtDate(a.created_at)}</span>
          ${del}
        </div>
      </div>
      <p class="text-body-md text-on-surface whitespace-pre-wrap break-words">${nl2br(a.body)}</p>
    </div>`;
  }

  async function showDetail(qid) {
    $('list-view').classList.add('hidden');
    const view = $('detail-view');
    view.classList.remove('hidden');
    view.innerHTML = '<p class="text-on-surface-variant py-lg text-center">불러오는 중…</p>';
    window.scrollTo({ top: 0 });

    let q, answers;
    try {
      q = await fetchQuestion(qid);
      if (!q) { view.innerHTML = '<p class="text-on-surface-variant py-lg text-center">질문을 찾을 수 없습니다.</p><div class="text-center"><button id="d-back" class="mt-2 text-primary font-bold">← 목록으로</button></div>'; $('d-back').addEventListener('click', () => go(null)); return; }
      incrementQuestionViews(qid); // 조회수 (실패 무시)
      answers = await fetchAnswers(qid);
    } catch (e) {
      view.innerHTML = `<p class="text-error py-lg text-center">불러오지 못했습니다. (${esc(e.message)})</p>`;
      return;
    }

    const canDeleteQ = state.isAdmin || (state.viewerId && q.author_id === state.viewerId);
    const answered = answers.length > 0;

    view.innerHTML = `
      <button id="d-back" class="mb-md inline-flex items-center gap-1 text-on-surface-variant hover:text-primary text-label-md font-bold">
        <span class="material-symbols-outlined text-[20px]">arrow_back</span>목록으로
      </button>

      <article class="bg-surface-container-lowest border border-outline-variant rounded-xl p-md md:p-lg mb-md swap-in">
        <div class="flex items-center justify-between gap-3 mb-3">
          <div class="flex flex-wrap items-center gap-2 min-w-0">${statusPill(answered)}${topicChip(q)}</div>
          ${canDeleteQ ? '<button id="q-del" class="text-caption text-outline hover:text-error flex items-center gap-1 shrink-0"><span class="material-symbols-outlined text-[18px]">delete</span>질문 삭제</button>' : ''}
        </div>
        <h2 class="text-headline-md text-on-surface mb-3 break-words">${esc(q.title)}</h2>
        <div class="flex items-center gap-3 text-outline text-label-md mb-md pb-md border-b border-outline-variant">
          <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[20px]">account_circle</span>${esc(q.author_name || '학생')}</span>
          <span>·</span><span>${fmtDate(q.created_at)}</span>
          <span>·</span><span class="flex items-center gap-1"><span class="material-symbols-outlined text-[18px]">visibility</span>${q.view_count || 0}</span>
        </div>
        <p class="text-body-md text-on-surface whitespace-pre-wrap break-words">${nl2br(q.body)}</p>
      </article>

      <div class="flex items-center gap-2 mb-3">
        <span class="material-symbols-outlined text-primary">forum</span>
        <h3 class="text-title-lg text-on-surface">답변 <span class="text-primary">${answers.length}</span></h3>
      </div>
      <div id="answer-list" class="space-y-3 mb-md">
        ${answers.length ? answers.map(answerCard).join('') : '<p class="text-on-surface-variant text-center py-lg bg-surface-container-lowest border border-dashed border-outline-variant rounded-xl">아직 답변이 없습니다. 선생님의 답변을 기다려주세요.</p>'}
      </div>

      ${state.isAdmin ? `
      <form id="answer-form" class="bg-surface-container-lowest border border-outline-variant rounded-xl p-md">
        <label for="a-body" class="text-label-md font-bold text-on-surface flex items-center gap-2 mb-2"><span class="material-symbols-outlined text-primary text-[20px]">reply</span>답변 작성 (교사)</label>
        <textarea id="a-body" rows="4" required placeholder="학생에게 전달할 답변을 작성하세요." class="w-full px-4 py-3 rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary bg-surface outline-none text-body-md resize-y"></textarea>
        <p id="answer-error" class="text-caption text-error hidden mt-1"></p>
        <div class="flex justify-end mt-3">
          <button type="submit" id="answer-submit" class="px-5 py-2.5 rounded-lg bg-primary text-on-primary font-bold hover:bg-primary-container transition-colors disabled:opacity-60">답변 등록</button>
        </div>
      </form>` : ''}
    `;

    $('d-back').addEventListener('click', () => go(null));
    if (canDeleteQ) $('q-del')?.addEventListener('click', async () => {
      if (!confirm('이 질문을 삭제하시겠습니까? 답변도 함께 삭제됩니다.')) return;
      try { await deleteQuestion(qid); go(null); } catch (e) { alert('삭제 실패: ' + e.message); }
    });
    view.querySelectorAll('.ans-del').forEach((b) => b.addEventListener('click', async () => {
      if (!confirm('이 답변을 삭제하시겠습니까?')) return;
      try { await deleteAnswer(b.dataset.aid); showDetail(qid); } catch (e) { alert('삭제 실패: ' + e.message); }
    }));
    if (state.isAdmin) $('answer-form')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const body = $('a-body').value.trim();
      if (!body) return;
      const btn = $('answer-submit'); btn.disabled = true;
      try {
        await createAnswer({ questionId: qid, body, authorName: state.viewerName });
        showDetail(qid);
      } catch (err) {
        const el = $('answer-error'); el.textContent = '등록 실패: ' + err.message; el.classList.remove('hidden');
        btn.disabled = false;
      }
    });
  }

  // ---------- 라우팅 ----------
  function go(qid) {
    const url = qid ? `?subject=${encodeURIComponent(subjectId)}&q=${encodeURIComponent(qid)}` : `?subject=${encodeURIComponent(subjectId)}`;
    history.pushState({}, '', url);
    route();
  }
  function route() {
    const qid = new URLSearchParams(location.search).get('q');
    if (qid) { showDetail(qid); }
    else { $('detail-view').classList.add('hidden'); $('detail-view').innerHTML = ''; $('list-view').classList.remove('hidden'); loadList(); }
  }
  window.addEventListener('popstate', route);

  // ---------- 작성 모달 · 단원 드롭다운 ----------
  function fillSelect(sel, items, placeholder) {
    sel.innerHTML = `<option value="">${placeholder}</option>` + (items || []).map((x) => `<option value="${x.id}">${esc(x.name)}</option>`).join('');
  }
  function populateUnits() {
    fillSelect($('q-unit'), state.subject.units || [], '대단원 전체');
    resetMidSub();
  }
  function resetMidSub() {
    fillSelect($('q-mid'), [], '중단원 전체'); $('q-mid').disabled = true;
    fillSelect($('q-sub'), [], '소단원 전체'); $('q-sub').disabled = true;
  }

  function openWrite() {
    $('write-error').classList.add('hidden');
    $('q-title').value = ''; $('q-body').value = '';
    $('q-unit').value = ''; resetMidSub();
    $('write-modal').classList.remove('hidden');
    $('q-title').focus();
  }
  function closeWrite() { $('write-modal').classList.add('hidden'); }

  // ---------- 시작 ----------
  (async () => {
    const auth = await requireLogin();
    if (!auth) return;
    if (!subjectId) { location.replace('과목-선택.html'); return; }

    state.isAdmin = !auth.student;
    state.viewerName = auth.student ? auth.student.name : '선생님';
    const { data: { user } } = await supabase.auth.getUser();
    state.viewerId = user ? user.id : null;

    $('who').textContent = auth.student ? auth.student.name : '관리자';
    if (state.isAdmin) $('teacher-badge').classList.remove('hidden');
    $('logout-btn').addEventListener('click', async () => { await signOut(); location.replace('학생-로그인.html'); });

    try {
      state.subject = await fetchSubjectTree(subjectId); // 이름·accent + 단원 트리(사이드바/드롭다운/태그용)
    } catch (_) { state.subject = null; }
    if (!state.subject) {
      $('list-view').innerHTML = '<p class="text-center text-on-surface-variant py-xl">이 과목에 접근할 권한이 없습니다.</p>';
      return;
    }
    indexTree(state.subject);
    populateUnits();
    document.title = `질의응답 · ${state.subject.name}`;
    $('subject-title').textContent = state.subject.name;
    $('crumb-subject').textContent = state.subject.name;
    $('crumb-subject').href = `과목-홈.html?subject=${encodeURIComponent(subjectId)}`;
    $('home-link').href = `과목-홈.html?subject=${encodeURIComponent(subjectId)}`;
    $('assess-link').href = `수행평가-공지.html?subject=${encodeURIComponent(subjectId)}`;
    $('submit-link').href = `산출물-제출.html?subject=${encodeURIComponent(subjectId)}`;
    $('list-subtitle').textContent = `${state.subject.name} 과목에 대해 자유롭게 질문하고 선생님의 답변을 확인하세요.`;

    // 사이드바: 특정 단원을 보는 페이지가 아니므로 강조 없이 접힌 상태로 시작
    sb.openUnit = null;
    sb.openMid = null;
    renderSidebarNav();

    // 이벤트 바인딩
    $('ask-btn').addEventListener('click', openWrite);
    $('write-close').addEventListener('click', closeWrite);
    $('write-cancel').addEventListener('click', closeWrite);
    $('write-backdrop').addEventListener('click', closeWrite);
    document.querySelectorAll('.fixed-link').forEach((a) => a.addEventListener('click', (e) => e.preventDefault())); // 미구현 링크
    // 모바일 사이드바 서랍
    const openSidebar = () => { $('sidebar').classList.add('drawer-open'); $('sidebar-backdrop').classList.remove('hidden'); };
    const closeSidebar = () => { $('sidebar').classList.remove('drawer-open'); $('sidebar-backdrop').classList.add('hidden'); };
    $('menu-btn').addEventListener('click', openSidebar);
    $('sidebar-close').addEventListener('click', closeSidebar);
    $('sidebar-backdrop').addEventListener('click', closeSidebar);
    // 단원 연쇄 드롭다운
    $('q-unit').addEventListener('change', () => {
      const u = topic.units.get($('q-unit').value);
      fillSelect($('q-mid'), u && u.mid_units, '중단원 전체'); $('q-mid').disabled = !u;
      fillSelect($('q-sub'), [], '소단원 전체'); $('q-sub').disabled = true;
    });
    $('q-mid').addEventListener('change', () => {
      const m = topic.mids.get($('q-mid').value);
      fillSelect($('q-sub'), m && m.subunits, '소단원 전체'); $('q-sub').disabled = !m;
    });
    $('search-input').addEventListener('input', (e) => { state.search = e.target.value; renderList(); });
    document.querySelectorAll('.filter-chip').forEach((chip) => chip.addEventListener('click', () => {
      state.filter = chip.dataset.filter;
      document.querySelectorAll('.filter-chip').forEach((c) => {
        const on = c === chip;
        c.classList.toggle('border-primary', on);
        c.classList.toggle('bg-primary-fixed', on);
        c.classList.toggle('text-on-primary-fixed', on);
        c.classList.toggle('font-bold', on);
        c.classList.toggle('border-outline-variant', !on);
        c.classList.toggle('text-on-surface-variant', !on);
      });
      renderList();
    }));
    $('write-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const title = $('q-title').value.trim();
      const body = $('q-body').value.trim();
      if (!title || !body) return;
      const btn = $('write-submit'); btn.disabled = true; $('write-submit-label').textContent = '등록 중…';
      try {
        const { id } = await createQuestion({
          subjectId, title, body, authorName: state.viewerName,
          unitId: $('q-unit').value, midUnitId: $('q-mid').value, subunitId: $('q-sub').value,
        });
        closeWrite();
        go(id);
      } catch (err) {
        const el = $('write-error'); el.textContent = '등록 실패: ' + err.message; el.classList.remove('hidden');
        btn.disabled = false; $('write-submit-label').textContent = '등록';
      }
    });

    route(); // 초기 화면 (목록 또는 상세)
  })();
})();
</script>

</body>
</html>
