<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>비밀번호 변경 · 정환쌤과 함께하는 과학 수업</title>

<!-- 실험노트 테마: Pretendard + Space Mono -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<script src="js/theme.js?v=20260724c"></script>
</head>
<body class="font-sans text-ink antialiased min-h-screen flex flex-col">

<!-- 상단 헤더 -->
<header class="sticky top-0 z-50 border-b border-ink/15 bg-paper/85 backdrop-blur-md">
  <div class="mx-auto max-w-6xl px-5 py-3 flex items-center gap-3">
    <span class="inline-flex h-9 w-9 items-center justify-center rounded-md bg-ink text-lime font-mono text-sm font-bold">LAB</span>
    <div class="leading-tight">
      <div class="font-mono text-[11px] uppercase tracking-[0.2em] text-signal">Science Class</div>
      <h1 class="font-bold tracking-tightest text-[15px] sm:text-[16px]">정환쌤과 함께하는 과학 수업</h1>
    </div>
  </div>
</header>

<main class="flex-grow mx-auto w-full max-w-6xl px-5 py-10 sm:py-14 flex items-center justify-center">

  <!-- 비밀번호 변경 폼 카드 -->
  <div class="relative w-full max-w-md">
    <span class="tape rot-1 absolute -top-3 left-8 z-10 px-4 py-1 font-mono text-[11px] font-bold uppercase tracking-widest">password reset</span>

    <div class="card rounded-2xl p-7 sm:p-9 shadow-note">
      <div class="flex items-start gap-3">
        <span class="inline-flex h-11 w-11 shrink-0 items-center justify-center rounded-lg bg-lime-soft text-ink">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/><circle cx="12" cy="16" r="1"/></svg>
        </span>
        <div>
          <h2 class="text-2xl font-extrabold tracking-tightest">새 비밀번호 설정</h2>
          <p class="mt-1 text-[13.5px] text-ink3">처음 로그인하셨네요. 안전을 위해 비밀번호를 바꿔주세요.</p>
        </div>
      </div>

      <form id="pw-form" class="mt-7 space-y-5">
        <!-- 새 비밀번호 -->
        <label class="block" for="pw1">
          <span class="font-mono text-[11px] font-bold uppercase tracking-[0.18em] text-ink3">01 · 새 비밀번호 <span class="text-signal">(6자 이상)</span></span>
          <div class="mt-2 relative">
            <span class="pointer-events-none absolute inset-y-0 left-3 flex items-center text-ink3/70">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input class="w-full rounded-lg border-faint bg-paper/60 pl-10 pr-3 py-2.5 text-[15px] tracking-widest text-ink placeholder:text-ink3/50 focus:border-ink focus:ring-2 focus:ring-lime/70"
                   id="pw1" type="password" required minlength="6" autocomplete="new-password" placeholder="새 비밀번호">
          </div>
        </label>

        <!-- 새 비밀번호 확인 -->
        <label class="block" for="pw2">
          <span class="font-mono text-[11px] font-bold uppercase tracking-[0.18em] text-ink3">02 · 새 비밀번호 확인</span>
          <div class="mt-2 relative">
            <span class="pointer-events-none absolute inset-y-0 left-3 flex items-center text-ink3/70">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m9 11 3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
            </span>
            <input class="w-full rounded-lg border-faint bg-paper/60 pl-10 pr-3 py-2.5 text-[15px] tracking-widest text-ink placeholder:text-ink3/50 focus:border-ink focus:ring-2 focus:ring-lime/70"
                   id="pw2" type="password" required minlength="6" autocomplete="new-password" placeholder="한 번 더 입력">
          </div>
        </label>

        <p id="pw-error" class="font-mono text-[12px] text-error hidden"></p>

        <!-- 변경 버튼 -->
        <button class="lift-hover group w-full rounded-lg bg-lime px-4 py-3.5 text-[15px] font-extrabold text-ink shadow-note hover:shadow-lift active:translate-y-0 disabled:opacity-60 flex items-center justify-center gap-1"
                id="pw-btn" type="submit">
          <span id="pw-label" class="tracking-tight">비밀번호 변경</span>
          <span class="inline-block transition-transform group-hover:translate-x-1">→</span>
        </button>

        <!-- 안내문 -->
        <div class="dashed pt-4 flex gap-2.5 text-[12.5px] leading-relaxed text-ink3">
          <svg class="mt-[3px] shrink-0 text-signal" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
          <p>새 비밀번호는 <span class="hl font-semibold">나만 아는 것</span>으로 정해주세요. 잊어버리면 <span class="font-semibold">정환쌤</span>께 문의하면 초기화할 수 있어요.</p>
        </div>
      </form>
    </div>
  </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/db.js?v=20260710a"></script>
<script>
(async () => {
  const { supabase, requireLogin } = window.DB;
  const $ = (id) => document.getElementById(id);

  // 로그인 상태 확인 (이 페이지는 비번 변경 필요 학생용)
  await requireLogin({ allowPasswordChangePage: true });

  $('pw-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    $('pw-error').classList.add('hidden');
    const p1 = $('pw1').value, p2 = $('pw2').value;
    if (p1 !== p2) { showError('두 비밀번호가 일치하지 않습니다.'); return; }
    if (p1.length < 6) { showError('비밀번호는 6자 이상이어야 합니다.'); return; }
    const btn = $('pw-btn'); btn.disabled = true; $('pw-label').textContent = '변경 중…';
    try {
      const { error } = await supabase.auth.updateUser({ password: p1 });
      if (error) throw error;
      const { error: rpcErr } = await supabase.rpc('mark_password_changed');
      if (rpcErr) throw rpcErr;
      location.replace('과목-선택.html');
    } catch (err) {
      showError(err.message); btn.disabled = false; $('pw-label').textContent = '비밀번호 변경';
    }
  });

  function showError(msg) { $('pw-error').textContent = msg; $('pw-error').classList.remove('hidden'); }
})();
</script>

</body>
</html>
