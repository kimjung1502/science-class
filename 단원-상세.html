<script src="js/db.js?v=20260705a"></script>
<script>
  const { fetchSubjectTree, MATERIAL_TYPES, esc, requireLogin, supabase, uploadToBucket, removeFromBucket, driveAccessToken, driveShareAnyone } = window.DB;

  const params = new URLSearchParams(location.search);
  const subjectId = params.get('subject');

  const $ = (id) => document.getElementById(id);
  const state = { tree: null, lastUnitId: null, midUnitId: null, subunitId: null, isAdmin: false, addingSubId: null };

  // ---------- 모바일 사이드바 서랍 ----------
  function openSidebar() { $('sidebar').classList.add('drawer-open'); $('sidebar-backdrop').classList.remove('hidden'); }
  function closeSidebar() { $('sidebar').classList.remove('drawer-open'); $('sidebar-backdrop').classList.add('hidden'); }
  $('menu-btn').addEventListener('click', openSidebar);
  $('sidebar-close').addEventListener('click', closeSidebar);
  $('sidebar-backdrop').addEventListener('click', closeSidebar);

  // height 애니메이션으로 펼치기/접기
  function setOpen(box, open) {
    if (open) {
      box.style.height = box.scrollHeight + 'px';
      const done = (e) => { if (e.propertyName === 'height') { box.style.height = 'auto'; box.removeEventListener('transitionend', done); } };
      box.addEventListener('transitionend', done);
    } else {
      box.style.height = box.scrollHeight + 'px';
      box.getBoundingClientRect(); // reflow
      requestAnimationFrame(() => { box.style.height = '0px'; });
    }
  }

  // ---------- 자료 카드 ----------
  function materialCard(m) {
    const t = MATERIAL_TYPES[m.type];
    if (!t) return '';
    const name = m.name || t.label;
    // 파일형인데 storage_path가 없으면 외부(구글 드라이브 등) 링크 → 새 탭으로 열기, ?download 미부여
    const isExternal = t.file && !m.storage_path && m.url && m.url !== '#';
    const newTab = t.newTab || isExternal;
    const tabAttr = newTab ? ' target="_blank" rel="noopener"' : '';
    const meta = m.meta || (newTab ? '새 탭에서 열기' : '');
    let href = m.url || '#';
    // 업로드 파일(Supabase): 다운로드 시 원본(한글) 파일명으로 받게 ?download 부여 (영상·외부링크 제외)
    if (t.file && !isExternal && m.original_filename && m.type !== 'video' && href !== '#') {
      href += (href.indexOf('?') >= 0 ? '&' : '?') + 'download=' + encodeURIComponent(m.original_filename);
    }
    const teacherBadge = m.teacher_only ? '<span class="text-caption text-orange-700 bg-orange-50 px-1.5 py-0.5 rounded shrink-0">교사만</span>' : '';
    return `<a href="${esc(href)}"${tabAttr} class="group p-sm bg-white border border-outline-variant rounded-lg hover:border-primary hover:shadow-sm hover:-translate-y-0.5 transition-all duration-200 flex items-center gap-3 min-h-[56px]">
      <div class="p-2 ${t.box} rounded shrink-0"><span class="material-symbols-outlined">${t.icon}</span></div>
      <div class="flex-1 overflow-hidden"><p class="text-label-md font-bold truncate">${esc(name)}</p><p class="text-caption text-on-surface-variant truncate">${esc(meta)}</p></div>
      ${teacherBadge}
      <span class="material-symbols-outlined text-outline opacity-0 group-hover:opacity-100 transition-opacity">${t.action}</span>
    </a>`;
  }

  function matCardWrap(m) {
    const card = materialCard(m);
    if (!state.isAdmin) return card;
    return `<div class="relative group/mat">${card}
      <button data-del-mat="${m.id}" data-del-path="${esc(m.storage_path || '')}" title="자료 삭제" class="del-material absolute top-1.5 right-1.5 p-1 rounded-md bg-white/95 border border-outline-variant text-on-surface-variant hover:text-error shadow-sm opacity-0 group-hover/mat:opacity-100 transition-opacity">
        <span class="material-symbols-outlined text-[16px]">delete</span></button>
    </div>`;
  }
  function materialsBlock(sub) {
    const materials = sub.materials || [];
    const addBtn = state.isAdmin
      ? `<button data-add-sub="${sub.id}" class="add-material inline-flex items-center gap-1 text-caption font-bold text-primary px-2.5 py-1.5 rounded-lg border border-primary/40 hover:bg-primary/5 transition-colors"><span class="material-symbols-outlined text-[18px]">add</span>자료 추가</button>`
      : '';
    const header = `<div class="flex items-center justify-between mb-sm"><h5 class="text-label-md font-bold text-primary uppercase tracking-wider">학습 자료</h5>${addBtn}</div>`;
    if (!materials.length) {
      return `${header}<p class="flex items-center justify-center gap-2 text-on-surface-variant text-label-md py-lg"><span class="material-symbols-outlined text-outline">folder_off</span>등록된 학습 자료가 없습니다.</p>`;
    }
    return `${header}<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-sm">${materials.map(matCardWrap).join('')}</div>`;
  }

  function subunitItem(u, i) {
    const no = String(i + 1).padStart(2, '0');
    const active = u.id === state.subunitId; // 선택한 소단원만 펼침 (중단원만 고르면 모두 접힘)
    return `<div id="sub-${u.id}" class="sub-card scroll-mt-20 bg-white border ${active ? 'border-primary/40' : 'border-outline-variant'} rounded-xl overflow-hidden shadow-sm hover:shadow-md transition-all">
      <button class="card-toggle w-full flex items-center justify-between p-md text-left hover:bg-surface-container-low transition-colors" aria-expanded="${active}">
        <div class="flex items-center gap-md">
          <div class="sub-badge w-10 h-10 rounded-lg ${active ? 'bg-primary text-white' : 'bg-surface-container text-on-surface-variant'} flex items-center justify-center font-bold shrink-0 transition-colors">${no}</div>
          <div>
            <h4 class="text-title-lg text-on-surface">${esc(u.name)}</h4>
            <p class="text-caption text-on-surface-variant mt-0.5">${esc(u.description)}</p>
          </div>
        </div>
        <span class="material-symbols-outlined arrow ${active ? 'rotate-180' : ''}">expand_more</span>
      </button>
      <div class="acc-panel" style="height:${active ? 'auto' : '0'}">
        <div class="p-md border-t border-outline-variant bg-surface-container-lowest">
          ${materialsBlock(u)}
        </div>
      </div>
    </div>`;
  }

  // ---------- 현재 선택 정보 찾기 ----------
  function findSelection() {
    const units = state.tree.units || [];
    // 열려 있는 대단원 (중단원 미선택 시에도 유지)
    const unit = units.find((u) => u.id === state.lastUnitId) || null;
    // 선택된 중단원 (없으면 null → 메인 비움)
    let mid = null;
    for (const u of units) {
      for (const m of u.mid_units || []) {
        if (m.id === state.midUnitId) mid = m;
      }
    }
    return { unit, mid };
  }

  // ---------- 사이드바 ----------
  function renderSidebar(animate) {
    const nav = $('sidebar-nav');
    nav.innerHTML = (state.tree.units || []).map((u) => {
      const unitOpen = u.id === state.lastUnitId;
      const mids = (u.mid_units || []).map((m) => {
        const on = m.id === state.midUnitId;
        const subs = (m.subunits || []).map((s) => {
          const sOn = s.id === state.subunitId;
          return `<button data-sub="${s.id}" data-mid="${m.id}" class="sub-btn w-full flex items-center gap-2 p-2 rounded-lg transition-all text-caption text-left ${sOn ? 'bg-primary-fixed text-primary font-bold' : 'text-on-surface hover:bg-surface-container-highest'}">
            <span class="material-symbols-outlined text-[18px] ${sOn ? 'text-primary' : 'text-outline'}">${sOn ? 'radio_button_checked' : 'radio_button_unchecked'}</span>
            <span>${esc(s.name)}</span>
          </button>`;
        }).join('');
        return `<div>
          <button data-mid="${m.id}" data-unit="${u.id}" class="mid-btn w-full flex items-center justify-between p-3 rounded-lg transition-all text-left ${on ? 'bg-secondary-container text-on-secondary-container font-bold' : 'text-on-surface-variant hover:bg-surface-container-highest'}">
            <span class="text-label-md text-left">${esc(m.name)}</span>
            <span class="material-symbols-outlined text-[18px] mid-chevron ${on ? 'rotate-180' : ''}">expand_more</span>
          </button>
          ${on ? `<div class="mt-1 ml-4 space-y-0.5 ${animate ? 'swap-in' : ''}">${subs || '<p class="text-caption text-on-surface-variant p-2">소단원이 없습니다.</p>'}</div>` : ''}
        </div>`;
      }).join('');
      return `<div>
        <button data-unit="${u.id}" class="unit-toggle w-full flex items-center justify-between p-3 rounded-lg hover:bg-surface-container-highest transition-all text-left">
          <span class="text-label-md font-bold ${unitOpen ? 'text-primary' : 'text-on-surface-variant'}">${esc(u.name)}</span>
          <span class="material-symbols-outlined arrow-icon text-outline ${unitOpen ? 'rotate-180' : ''}">expand_more</span>
        </button>
        <div class="acc-panel" style="height:${unitOpen ? 'auto' : '0'}"><div class="mt-1 space-y-1">${mids}</div></div>
      </div>`;
    }).join('');

    nav.querySelectorAll('.unit-toggle').forEach((btn) =>
      btn.addEventListener('click', () => {
        const box = btn.nextElementSibling;
        const open = btn.querySelector('.arrow-icon').classList.toggle('rotate-180');
        if (open) state.lastUnitId = btn.dataset.unit; // 열면 이 대단원을 현재 열린 것으로 기억
        setOpen(box, open);
      })
    );
    nav.querySelectorAll('.mid-btn').forEach((btn) =>
      btn.addEventListener('click', () => {
        state.lastUnitId = btn.dataset.unit;                 // 부모 대단원은 계속 열림
        state.midUnitId = (state.midUnitId === btn.dataset.mid) ? null : btn.dataset.mid; // 같은 중단원 다시 누르면 접기
        state.subunitId = null;
        render(true);
      })
    );
    nav.querySelectorAll('.sub-btn').forEach((btn) =>
      btn.addEventListener('click', () => {
        const sameMid = btn.dataset.mid === state.midUnitId;
        state.midUnitId = btn.dataset.mid;
        state.subunitId = btn.dataset.sub;
        if (sameMid) { renderSidebar(); openSubunitCard(state.subunitId); }  // 목록 유지 → 카드만 애니메이션
        else { render(true); scrollToActive(); }                             // 다른 중단원 → 목록 교체(애니메이션)
        closeSidebar(); // 모바일: 소단원 선택 시 서랍 닫아 본문 표시
      })
    );
  }

  function scrollToActive() {
    if (!state.subunitId) return;
    requestAnimationFrame(() => $('sub-' + state.subunitId)?.scrollIntoView({ behavior: 'smooth', block: 'start' }));
  }

  // 메인 목록을 다시 그리지 않고, 클릭한 소단원 카드만 부드럽게 펼치고 나머지는 접기
  function openSubunitCard(subId) {
    document.querySelectorAll('#subunit-list .sub-card').forEach((card) => {
      const on = card.id === 'sub-' + subId;
      const btn = card.querySelector('.card-toggle');
      const arrow = btn.querySelector('.arrow');
      const badge = card.querySelector('.sub-badge');
      const wasOpen = arrow.classList.contains('rotate-180');
      if (on !== wasOpen) {
        arrow.classList.toggle('rotate-180', on);
        btn.setAttribute('aria-expanded', on);
        setOpen(btn.nextElementSibling, on);
      }
      // 강조 스타일 전환
      card.classList.toggle('border-primary/40', on);
      card.classList.toggle('border-outline-variant', !on);
      badge.classList.toggle('bg-primary', on);
      badge.classList.toggle('text-white', on);
      badge.classList.toggle('bg-surface-container', !on);
      badge.classList.toggle('text-on-surface-variant', !on);
    });
    scrollToActive();
  }

  // ---------- 브레드크럼 · 히어로 · 소단원 ----------
  function renderMain(animate) {
    const { unit, mid } = findSelection();
    const chev = '<span class="material-symbols-outlined text-outline text-[16px]">chevron_right</span>';
    $('breadcrumb').innerHTML = [
      `<span class="text-on-surface-variant">${esc(state.tree.name)}</span>`,
      unit ? `<span class="text-on-surface-variant">${esc(unit.name)}</span>` : '',
      mid ? `<span class="text-primary font-bold border-b-2 border-primary">${esc(mid.name)}</span>` : '',
    ].filter(Boolean).join(chev);

    $('hero-subject').textContent = state.tree.name;
    $('hero-path').innerHTML = [unit && esc(unit.name), mid && esc(mid.name)].filter(Boolean).join(' <span class="text-outline">›</span> ');

    const list = $('subunit-list');
    const subs = (mid && mid.subunits) || [];
    list.innerHTML = !mid
      ? '<p class="flex items-center justify-center gap-2 text-center text-on-surface-variant py-xl"><span class="material-symbols-outlined text-outline">list</span>왼쪽에서 중단원을 선택하세요.</p>'
      : (subs.length
          ? subs.map(subunitItem).join('')
          : '<p class="text-center text-on-surface-variant py-lg">이 중단원에는 소단원이 없습니다.</p>');
    if (animate) { list.classList.remove('swap-in'); void list.offsetWidth; list.classList.add('swap-in'); }

    document.querySelectorAll('#subunit-list a[href="#"]').forEach((a) => a.addEventListener('click', (e) => e.preventDefault()));
    document.querySelectorAll('#subunit-list .card-toggle').forEach((btn) => btn.addEventListener('click', () => {
      const box = btn.nextElementSibling;
      const open = btn.querySelector('.arrow').classList.toggle('rotate-180');
      btn.setAttribute('aria-expanded', open);
      setOpen(box, open);
    }));
    if (state.isAdmin) {
      document.querySelectorAll('#subunit-list .add-material').forEach((btn) => btn.addEventListener('click', (e) => { e.stopPropagation(); openMatModal(btn.dataset.addSub); }));
      document.querySelectorAll('#subunit-list .del-material').forEach((btn) => btn.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); deleteMaterial(btn.dataset.delMat, btn.dataset.delPath); }));
    }
  }

  function render(animate) { findSelection(); renderSidebar(animate); renderMain(animate); }

  // ================= 교사: 이 화면에서 자료 추가/삭제 =================
  function safeStorageName(fn) {
    fn = String(fn || '');
    const dot = fn.lastIndexOf('.');
    const ext = (dot > 0 ? fn.slice(dot + 1) : '').replace(/[^A-Za-z0-9]/g, '').toLowerCase();
    let base = (dot > 0 ? fn.slice(0, dot) : fn).replace(/[^A-Za-z0-9._-]+/g, '_').replace(/_+/g, '_').replace(/^[_.-]+|[_.-]+$/g, '');
    if (!base) base = 'file';
    return ext ? `${base}.${ext}` : base;
  }
  async function reloadTree() {
    state.tree = await fetchSubjectTree(subjectId);
    render();
    if (state.subunitId) scrollToActive();
  }

  let matModalEl = null;
  function ensureMatModal() {
    if (matModalEl) return matModalEl;
    const el = document.createElement('div');
    el.id = 'mat-modal';
    el.className = 'hidden fixed inset-0 z-[70] bg-black/40 flex items-center justify-center p-4';
    el.innerHTML = `<div class="bg-white rounded-xl w-full max-w-md max-h-[90vh] overflow-y-auto p-lg shadow-xl">
      <div class="flex items-center justify-between mb-md"><h3 class="text-title-lg font-bold">자료 추가</h3>
        <button id="mat-close" class="p-1 text-on-surface-variant hover:text-on-surface"><span class="material-symbols-outlined">close</span></button></div>
      <form id="mat-form" class="space-y-sm"></form></div>`;
    document.body.appendChild(el);
    el.addEventListener('click', (e) => { if (e.target === el) closeMatModal(); });
    el.querySelector('#mat-close').addEventListener('click', closeMatModal);
    matModalEl = el;
    return el;
  }
  function matFormHtml() {
    const typeOpts = Object.entries(MATERIAL_TYPES).map(([k, t]) => `<option value="${k}">${esc(t.label)}</option>`).join('');
    return `
      <div><label class="text-label-md text-on-surface-variant">자료 유형</label>
        <select name="type" id="m2-type" class="w-full mt-1 rounded-lg border-outline-variant focus:border-primary focus:ring-primary">${typeOpts}</select></div>
      <div><label class="text-label-md text-on-surface-variant">이름 <span class="text-outline">(비우면 유형 기본)</span></label>
        <input name="name" id="m2-name" type="text" class="w-full mt-1 rounded-lg border-outline-variant focus:border-primary focus:ring-primary" placeholder="예: 1강 학습지"></div>
      <div id="m2-file-field"><label class="text-label-md text-on-surface-variant">파일 업로드 <span class="text-outline">(Supabase)</span></label>
        <input name="file" id="m2-file" type="file" class="w-full mt-1 text-caption">
        <div class="mt-2 flex items-center gap-2"><span class="text-caption text-on-surface-variant">또는</span>
          <button type="button" id="m2-drive" class="inline-flex items-center gap-1 text-caption px-2.5 py-1.5 rounded-lg border border-outline-variant hover:bg-surface-container transition-colors"><span class="material-symbols-outlined text-[16px] text-primary">add_to_drive</span>구글 드라이브에서 선택 <span class="text-outline">(용량 0)</span></button></div>
        <p id="m2-picked" class="text-caption text-primary mt-1 hidden"></p>
        <input type="hidden" name="drive_url" id="m2-drive-url"><input type="hidden" name="drive_name" id="m2-drive-name"></div>
      <div id="m2-url-field" class="hidden"><label class="text-label-md text-on-surface-variant">링크 주소 (URL)</label>
        <input name="url" id="m2-url" type="url" class="w-full mt-1 rounded-lg border-outline-variant focus:border-primary focus:ring-primary" placeholder="https://..."></div>
      <div><label class="text-label-md text-on-surface-variant">부가 설명 <span class="text-outline">(선택)</span></label>
        <input name="meta" id="m2-meta" type="text" class="w-full mt-1 rounded-lg border-outline-variant focus:border-primary focus:ring-primary" placeholder="예: 12쪽"></div>
      <label class="flex items-center gap-2 p-1 cursor-pointer"><input type="checkbox" name="teacher_only" id="m2-teacher" class="rounded text-primary focus:ring-primary"><span class="text-body-md">교사만 보기 <span class="text-caption text-on-surface-variant">(학생 화면에 안 보임)</span></span></label>
      <div class="flex gap-2 pt-1"><button type="button" id="m2-cancel" class="flex-1 border border-outline-variant py-2.5 rounded-lg text-label-md">취소</button><button type="submit" id="m2-save" class="flex-1 bg-primary text-white py-2.5 rounded-lg text-label-md font-bold">저장</button></div>`;
  }
  function openMatModal(subId) {
    state.addingSubId = subId;
    ensureMatModal();
    const form = matModalEl.querySelector('#mat-form');
    form.innerHTML = matFormHtml();
    const sel = form.querySelector('#m2-type');
    const sync = () => { const t = MATERIAL_TYPES[sel.value]; form.querySelector('#m2-file-field').classList.toggle('hidden', !t.file); form.querySelector('#m2-url-field').classList.toggle('hidden', t.file); };
    sel.addEventListener('change', sync); sync();
    form.querySelector('#m2-drive').addEventListener('click', () => openDrivePicker(form));
    form.querySelector('#m2-cancel').addEventListener('click', closeMatModal);
    form.onsubmit = onMatSubmit;
    matModalEl.classList.remove('hidden');
  }
  function closeMatModal() { if (matModalEl) { matModalEl.classList.add('hidden'); matModalEl.querySelector('#mat-form').innerHTML = ''; } state.addingSubId = null; }

  function loadPickerApi() {
    return new Promise((resolve, reject) => {
      if (window.google && window.google.picker) return resolve();
      const finish = () => window.gapi.load('picker', { callback: resolve, onerror: () => reject(new Error('Picker 모듈 로드 실패')) });
      if (window.gapi) return finish();
      const s = document.createElement('script');
      s.src = 'https://apis.google.com/js/api.js';
      s.onload = finish;
      s.onerror = () => reject(new Error('구글 API를 불러오지 못했습니다 (네트워크/차단 확인). 대신 파일 업로드를 쓰세요.'));
      document.head.appendChild(s);
    });
  }
  async function openDrivePicker(form) {
    const btn = form.querySelector('#m2-drive'); const old = btn.innerHTML; btn.disabled = true; btn.textContent = '여는 중…';
    try {
      const { access_token, api_key, app_id } = await driveAccessToken();
      await loadPickerApi();
      const view = new google.picker.DocsView(google.picker.ViewId.DOCS).setIncludeFolders(false).setSelectFolderEnabled(false).setMode(google.picker.DocsViewMode.LIST);
      const picker = new google.picker.PickerBuilder().setAppId(app_id).setOAuthToken(access_token).setDeveloperKey(api_key).setTitle('수업 자료로 넣을 파일 선택').addView(view).setCallback((data) => onDrivePicked(data, access_token, form)).build();
      picker.setVisible(true);
    } catch (e) { alert('드라이브 선택기 열기 실패: ' + e.message); } finally { btn.disabled = false; btn.innerHTML = old; }
  }
  async function onDrivePicked(data, token, form) {
    if (!window.google || data.action !== google.picker.Action.PICKED) return;
    const doc = (data.docs || [])[0]; if (!doc) return;
    const picked = form.querySelector('#m2-picked'); picked.classList.remove('hidden'); picked.textContent = '공유 설정 중…';
    try {
      await driveShareAnyone(doc.id, token);
      form.querySelector('#m2-drive-url').value = doc.url || ('https://drive.google.com/file/d/' + doc.id + '/view');
      form.querySelector('#m2-drive-name').value = doc.name || '';
      const nameInput = form.querySelector('#m2-name'); if (nameInput && !nameInput.value.trim()) nameInput.value = doc.name || '';
      const fi = form.querySelector('#m2-file'); if (fi) fi.value = '';
      picked.textContent = '✓ 드라이브 파일 선택됨: ' + (doc.name || doc.id) + ' — 저장하면 링크로 등록';
    } catch (e) { picked.textContent = '공유 설정 실패: ' + e.message; }
  }
  async function onMatSubmit(e) {
    e.preventDefault();
    const form = e.target;
    const saveBtn = form.querySelector('#m2-save'); saveBtn.disabled = true; saveBtn.textContent = '저장 중…';
    try {
      const fd = new FormData(form);
      const type = fd.get('type'); const t = MATERIAL_TYPES[type];
      const payload = { type, name: (fd.get('name') || '').trim(), meta: (fd.get('meta') || '').trim(), teacher_only: fd.get('teacher_only') === 'on', subunit_id: state.addingSubId, sort_order: Date.now() % 100000 };
      if (t.file) {
        const driveUrl = (fd.get('drive_url') || '').trim();
        if (driveUrl) { payload.url = driveUrl; payload.storage_path = ''; payload.original_filename = (fd.get('drive_name') || '').trim(); }
        else {
          const file = fd.get('file');
          if (file && file.size) {
            const path2 = `${state.addingSubId}/${Date.now()}-${safeStorageName(file.name)}`;
            await uploadToBucket('materials', path2, file);
            payload.storage_path = path2; payload.original_filename = file.name;
            payload.url = supabase.storage.from('materials').getPublicUrl(path2).data.publicUrl;
          } else throw new Error('파일을 업로드하거나 드라이브에서 고르세요.');
        }
      } else {
        payload.url = (fd.get('url') || '').trim(); payload.storage_path = '';
        if (!payload.url) throw new Error('링크 주소를 입력하세요.');
      }
      const { error } = await supabase.from('materials').insert(payload);
      if (error) throw error;
      closeMatModal();
      await reloadTree();
    } catch (err) { alert('저장 실패: ' + err.message); } finally { if (form.querySelector('#m2-save')) { saveBtn.disabled = false; saveBtn.textContent = '저장'; } }
  }
  async function deleteMaterial(id, storagePath) {
    if (!confirm('이 자료를 삭제할까요?')) return;
    try {
      if (storagePath) await removeFromBucket('materials', [storagePath]);
      const { error } = await supabase.from('materials').delete().eq('id', id);
      if (error) throw error;
      await reloadTree();
    } catch (e) { alert('삭제 실패: ' + e.message); }
  }

  // ---------- 시작 ----------
  (async () => {
    const auth = await requireLogin(); // 로그인 필수
    if (!auth) return;
    state.isAdmin = !auth.student; // 학생이 아니면 교사(관리자)
    if (!subjectId) { location.replace('과목-선택.html'); return; }
    try {
      state.tree = await fetchSubjectTree(subjectId);
      $('subject-title').textContent = state.tree.name;
      document.title = `${state.tree.name} · 정환쌤과 함께하는 과학 수업`;
      $('home-link').href = `과목-홈.html?subject=${encodeURIComponent(subjectId)}`;
      $('qna-link').href = `질의응답.html?subject=${encodeURIComponent(subjectId)}`;
      $('assess-link').href = `수행평가-공지.html?subject=${encodeURIComponent(subjectId)}`;
      $('submit-link').href = `산출물-제출.html?subject=${encodeURIComponent(subjectId)}`;
      document.querySelectorAll('.fixed-link').forEach((a) => a.addEventListener('click', (e) => e.preventDefault())); // 미구현 링크(실험실 안전)
      // ?sub=<소단원id> 로 들어오면 그 소단원을 펼침 (질의응답 사이드바 등에서 연결)
      const subParam = params.get('sub');
      let target = null;
      if (subParam) {
        for (const u of state.tree.units || []) {
          for (const m of u.mid_units || []) {
            if ((m.subunits || []).some((s) => s.id === subParam)) { target = { unit: u, mid: m }; break; }
          }
          if (target) break;
        }
      }
      if (target) {
        state.lastUnitId = target.unit.id;
        state.midUnitId = target.mid.id;
        state.subunitId = subParam;
      } else {
        // 초기: 첫 대단원 열고 첫 중단원 선택
        const firstUnit = (state.tree.units || [])[0];
        const firstMid = firstUnit && (firstUnit.mid_units || [])[0];
        state.lastUnitId = firstUnit ? firstUnit.id : null;
        state.midUnitId = firstMid ? firstMid.id : null;
      }
      render();
      if (target) scrollToActive();
    } catch (e) {
      $('subunit-list').innerHTML = `<p class="text-error py-lg text-center">단원을 불러오지 못했습니다. (${esc(e.message)})</p>`;
    }
  })();
</script>

</body>
</html>
